<style>
/* ============================================================
   CSS.html — HR System Styles (Screen + Print)
   ============================================================ */

/* ── المتغيرات ── */
:root {
  --primary        : #1a3a5c;
  --primary-light  : #2d6a9f;
  --accent         : #c8972a;
  --accent-light   : #e8b84b;
  --bg             : #f0f4f8;
  --card-bg        : #ffffff;
  --text-main      : #1e2b3a;
  --text-muted     : #6b7a8d;
  --border         : #dce4ef;
  --success        : #2e7d52;
  --danger         : #c0392b;
  --shadow-sm      : 0 2px 8px rgba(0,0,0,0.08);
  --shadow-md      : 0 6px 24px rgba(0,0,0,0.12);
  --radius         : 12px;
  --radius-sm      : 8px;
}

/* ── إعادة التهيئة ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Cairo', 'Segoe UI', Tahoma, sans-serif;
  background : var(--bg);
  color      : var(--text-main);
  direction  : rtl;
  min-height : 100vh;
}

/* ── رأس الصفحة ── */
.app-header {
  background   : linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
  padding      : 20px 32px;
  display      : flex;
  align-items  : center;
  gap          : 16px;
  box-shadow   : 0 4px 16px rgba(26,58,92,0.3);
  position     : sticky;
  top          : 0;
  z-index      : 100;
}

.header-logo {
  width           : 52px;
  height          : 52px;
  background      : rgba(255,255,255,0.15);
  border-radius   : 50%;
  display         : flex;
  align-items     : center;
  justify-content : center;
  font-size       : 24px;
  flex-shrink     : 0;
}

.header-text h1 {
  font-size   : 20px;
  font-weight : 700;
  color       : #ffffff;
  line-height : 1.2;
}

.header-text p {
  font-size : 13px;
  color     : rgba(255,255,255,0.75);
  margin-top: 2px;
}

.header-date {
  margin-right  : auto;
  text-align    : left;
  color         : rgba(255,255,255,0.8);
  font-size     : 13px;
  line-height   : 1.6;
}

/* ── الحاوية الرئيسية ── */
.main-container {
  max-width : 980px;
  margin    : 32px auto;
  padding   : 0 20px 60px;
}

/* ── بطاقة ── */
.card {
  background    : var(--card-bg);
  border-radius : var(--radius);
  box-shadow    : var(--shadow-sm);
  border        : 1px solid var(--border);
  overflow      : hidden;
}

.card-header {
  background  : linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
  padding     : 16px 24px;
  display     : flex;
  align-items : center;
  gap         : 10px;
}

.card-header h2 {
  font-size   : 16px;
  font-weight : 700;
  color       : #ffffff;
}

.card-header .icon {
  font-size : 20px;
}

.card-body {
  padding : 24px;
}

/* ── منطقة البحث ── */
.search-card {
  margin-bottom : 24px;
}

.search-grid {
  display               : grid;
  grid-template-columns : 1fr 1fr auto;
  gap                   : 16px;
  align-items           : end;
}

.form-group {
  display        : flex;
  flex-direction : column;
  gap            : 6px;
}

.form-group label {
  font-size   : 13px;
  font-weight : 600;
  color       : var(--text-muted);
}

.form-group label span.required {
  color : var(--danger);
}

.form-control {
  border        : 1.5px solid var(--border);
  border-radius : var(--radius-sm);
  padding       : 11px 14px;
  font-size     : 14px;
  font-family   : inherit;
  color         : var(--text-main);
  background    : #fafbfd;
  transition    : border-color 0.2s, box-shadow 0.2s;
  width         : 100%;
  direction     : rtl;
}

.form-control:focus {
  outline      : none;
  border-color : var(--primary-light);
  box-shadow   : 0 0 0 3px rgba(45,106,159,0.15);
  background   : #ffffff;
}

select.form-control { appearance: none; cursor: pointer; }

/* ── الأزرار ── */
.btn {
  display         : inline-flex;
  align-items     : center;
  justify-content : center;
  gap             : 8px;
  padding         : 11px 24px;
  border-radius   : var(--radius-sm);
  font-size       : 14px;
  font-weight     : 600;
  font-family     : inherit;
  cursor          : pointer;
  border          : none;
  transition      : all 0.2s;
  white-space     : nowrap;
  text-decoration : none;
}

.btn-primary {
  background : linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
  color      : #ffffff;
  box-shadow : 0 3px 12px rgba(26,58,92,0.3);
}

.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(26,58,92,0.35); }
.btn-primary:active { transform: translateY(0); }

.btn-accent {
  background : linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
  color      : #ffffff;
  box-shadow : 0 3px 12px rgba(200,151,42,0.3);
}

.btn-accent:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(200,151,42,0.35); }

.btn-outline {
  background : transparent;
  color      : var(--primary);
  border     : 1.5px solid var(--primary);
}
.btn-outline:hover { background: var(--primary); color: #fff; }

.btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none !important; }

.btn-pdf {
  background : linear-gradient(135deg, #b5371f 0%, #e05535 100%);
  color      : #ffffff;
  box-shadow : 0 3px 12px rgba(181,55,31,0.35);
}
.btn-pdf:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(181,55,31,0.4); }
.btn-pdf:disabled { opacity: 0.7; }

.btn-row {
  display    : flex;
  gap        : 12px;
  margin-top : 20px;
  flex-wrap  : wrap;
}

/* ── الإشعارات ── */
.alert {
  border-radius : var(--radius-sm);
  padding       : 14px 18px;
  font-size     : 14px;
  font-weight   : 500;
  display       : flex;
  align-items   : center;
  gap           : 10px;
  margin-bottom : 20px;
}

.alert-danger  { background: #fdf0ee; border: 1px solid #f5c6c2; color: var(--danger); }
.alert-success { background: #edf7f2; border: 1px solid #b8deca; color: var(--success); }
.alert-info    { background: #eef4fb; border: 1px solid #bdd4eb; color: var(--primary); }

/* ── بطاقة معلومات الموظف ── */
.employee-card {
  margin-bottom : 24px;
}

.employee-header {
  background  : linear-gradient(135deg, #1a3a5c 0%, #2d6a9f 60%, #3a85c8 100%);
  padding     : 28px 28px 24px;
  position    : relative;
  overflow    : hidden;
}

.employee-header::before {
  content    : '';
  position   : absolute;
  top        : -30px;
  left       : -30px;
  width      : 140px;
  height     : 140px;
  border-radius: 50%;
  background : rgba(255,255,255,0.05);
}

.employee-header::after {
  content    : '';
  position   : absolute;
  bottom     : -40px;
  right      : -20px;
  width      : 180px;
  height     : 180px;
  border-radius: 50%;
  background : rgba(255,255,255,0.04);
}

.emp-main-info {
  display     : flex;
  align-items : center;
  gap         : 20px;
  position    : relative;
  z-index     : 1;
}

.emp-avatar {
  width           : 72px;
  height          : 72px;
  border-radius   : 50%;
  background      : rgba(255,255,255,0.18);
  display         : flex;
  align-items     : center;
  justify-content : center;
  font-size       : 32px;
  flex-shrink     : 0;
  border          : 2px solid rgba(255,255,255,0.3);
}

.emp-name {
  font-size   : 22px;
  font-weight : 700;
  color       : #ffffff;
  line-height : 1.2;
}

.emp-title {
  font-size  : 14px;
  color      : rgba(255,255,255,0.8);
  margin-top : 4px;
}

.emp-id-badge {
  margin-right : auto;
  background   : rgba(255,255,255,0.15);
  border       : 1px solid rgba(255,255,255,0.25);
  border-radius: 20px;
  padding      : 6px 16px;
  color        : #ffffff;
  font-size    : 13px;
  font-weight  : 600;
}

/* ── شبكة التفاصيل ── */
.details-grid {
  display               : grid;
  grid-template-columns : repeat(3, 1fr);
  gap                   : 1px;
  background            : var(--border);
}

.detail-item {
  background  : var(--card-bg);
  padding     : 16px 20px;
  display     : flex;
  flex-direction: column;
  gap         : 4px;
}

.detail-label {
  font-size  : 11px;
  font-weight: 600;
  color      : var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.detail-value {
  font-size  : 15px;
  font-weight: 600;
  color      : var(--text-main);
}

/* ── قسم الإحصاءات ── */
.stats-section {
  margin-bottom: 24px;
}

.stats-header {
  display      : flex;
  align-items  : center;
  justify-content: space-between;
  margin-bottom: 16px;
  flex-wrap    : wrap;
  gap          : 10px;
}

.stats-header h3 {
  font-size  : 16px;
  font-weight: 700;
  color      : var(--primary);
  display    : flex;
  align-items: center;
  gap        : 8px;
}

.period-badge {
  background   : linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
  color        : #ffffff;
  font-size    : 12px;
  font-weight  : 700;
  padding      : 4px 14px;
  border-radius: 20px;
}

.stats-grid {
  display              : grid;
  grid-template-columns: repeat(3, 1fr);
  gap                  : 16px;
}

.stat-card {
  background   : var(--card-bg);
  border-radius: var(--radius);
  border       : 1px solid var(--border);
  padding      : 20px 18px;
  text-align   : center;
  box-shadow   : var(--shadow-sm);
  transition   : transform 0.2s, box-shadow 0.2s;
  position     : relative;
  overflow     : hidden;
}

.stat-card::before {
  content      : '';
  position     : absolute;
  top          : 0;
  right        : 0;
  left         : 0;
  height       : 4px;
  background   : var(--stat-color, var(--primary));
}

.stat-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }

.stat-icon {
  font-size    : 28px;
  margin-bottom: 8px;
  display      : block;
}

.stat-value {
  font-size  : 32px;
  font-weight: 800;
  color      : var(--stat-color, var(--primary));
  line-height: 1;
  margin-bottom: 6px;
}

.stat-label {
  font-size : 12px;
  color     : var(--text-muted);
  font-weight: 600;
  line-height: 1.4;
}

/* ألوان بطاقات الإحصاء */
.stat-card.color-blue   { --stat-color: #1a6fa8; }
.stat-card.color-teal   { --stat-color: #0d7a6e; }
.stat-card.color-purple { --stat-color: #6a3d9a; }
.stat-card.color-orange { --stat-color: #c86a1a; }
.stat-card.color-red    { --stat-color: #b5371f; }
.stat-card.color-green  { --stat-color: #2e7d52; }

/* ── مؤشر التحميل ── */
.loader-overlay {
  position        : fixed;
  inset           : 0;
  background      : rgba(240,244,248,0.85);
  display         : flex;
  flex-direction  : column;
  align-items     : center;
  justify-content : center;
  z-index         : 999;
  backdrop-filter : blur(4px);
  gap             : 16px;
}

.loader-spinner {
  width        : 52px;
  height       : 52px;
  border       : 4px solid var(--border);
  border-top   : 4px solid var(--primary-light);
  border-radius: 50%;
  animation    : spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loader-text {
  font-size  : 15px;
  font-weight: 600;
  color      : var(--primary);
}

/* ── قسم مخفي ── */
.hidden { display: none !important; }

/* ── جدول الحضور ── */
.att-table {
  width           : 100%;
  border-collapse : collapse;
  font-size       : 13px;
  direction       : rtl;
}

.att-table thead tr {
  background : linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
}

.att-table thead th {
  color       : #ffffff;
  font-weight : 700;
  padding     : 12px 16px;
  text-align  : center;
  white-space : nowrap;
  font-size   : 12px;
}

.att-table tbody tr {
  border-bottom : 1px solid var(--border);
  transition    : background 0.15s;
}

.att-table tbody tr:last-child { border-bottom: none; }
.att-table tbody tr:hover { background: #f5f8fc; }

.att-table tbody td {
  padding    : 11px 16px;
  text-align : center;
  color      : var(--text-main);
  font-weight: 500;
}

/* حالة التأخير */
.badge-late {
  background   : #fdf0ee;
  color        : #b5371f;
  border       : 1px solid #f5c6c2;
  border-radius: 20px;
  padding      : 3px 10px;
  font-size    : 11px;
  font-weight  : 700;
}

.badge-ok {
  background   : #edf7f2;
  color        : #2e7d52;
  border       : 1px solid #b8deca;
  border-radius: 20px;
  padding      : 3px 10px;
  font-size    : 11px;
  font-weight  : 700;
}

.badge-absent {
  background   : #f5f5f5;
  color        : #888;
  border       : 1px solid #ddd;
  border-radius: 20px;
  padding      : 3px 10px;
  font-size    : 11px;
  font-weight  : 700;
}

/* صف الجمعة/السبت */
.att-table tbody tr.weekend-row { background: #fafafa; }
.att-table tbody tr.weekend-row td { color: var(--text-muted); }

/* تأخير النص بالأحمر */
.late-minutes { color: #b5371f; font-weight: 700; }

/* طباعة الجدول */
@media print {
  .att-table { font-size: 9pt; }
  .att-table thead th { padding: 6pt 8pt; font-size: 8pt; }
  .att-table tbody td { padding: 5pt 8pt; }
  .att-table tbody tr:nth-child(even) { background: #f8f8f8; }
}

/* ── تذييل الصفحة ── */
.app-footer {
  text-align : center;
  padding    : 20px;
  font-size  : 12px;
  color      : var(--text-muted);
  border-top : 1px solid var(--border);
  margin-top : 40px;
}

/* ── تظهر فقط عند الطباعة ── */
.print-header,
.print-footer,
.gov-top-bar,
.gov-org-row,
.gov-doc-title-row,
.gov-doc-info-row,
.gov-divider-double {
  display: none;
}

/* ─────────────────────────────────────────────
   تنسيقات النموذج الحكومي الرسمي — طباعة
   ───────────────────────────────────────────── */
@media print {

  /* إخفاء عناصر الواجهة */
  .app-header,
  .search-card,
  .btn-row,
  .app-footer,
  .loader-overlay,
  .no-print {
    display : none !important;
  }

  @page {
    size    : A4 portrait;
    margin  : 15mm 15mm 20mm 15mm;
  }

  body {
    background : #ffffff;
    font-size  : 11pt;
    color      : #000000;
    direction  : rtl;
    font-family: 'Cairo', 'Tahoma', sans-serif;
  }

  .main-container {
    max-width : 100%;
    margin    : 0;
    padding   : 0;
  }

  /* ══ رأس النموذج الحكومي ══ */
  .print-header {
    display       : block !important;
    margin-bottom : 14pt;
  }

  /* شريط وطني علوي */
  .gov-top-bar {
    display               : grid !important;
    grid-template-columns : 1fr auto 1fr;
    align-items           : center;
    background            : #1a3a5c;
    color                 : #ffffff;
    padding               : 5pt 12pt;
    -webkit-print-color-adjust: exact;
    print-color-adjust    : exact;
  }

  .gov-top-right {
    font-size  : 10pt;
    font-weight: 700;
    text-align : right;
  }

  .gov-emblem {
    font-size : 16pt;
    text-align: center;
  }

  .gov-top-left {
    font-size  : 9pt;
    text-align : left;
    opacity    : 0.85;
  }

  /* اسم الجهة والقسم */
  .gov-org-row {
    display    : block !important;
    text-align : center;
    padding    : 10pt 0 6pt;
    border-bottom: 1.5pt solid #1a3a5c;
    margin-bottom: 8pt;
  }

  .gov-org-main {
    font-size  : 15pt;
    font-weight: 800;
    color      : #1a3a5c;
    letter-spacing: 0.5pt;
  }

  .gov-org-sub {
    font-size  : 10pt;
    color      : #444444;
    margin-top : 2pt;
    font-weight: 600;
  }

  /* سطر عنوان الوثيقة */
  .gov-doc-title-row {
    display               : grid !important;
    grid-template-columns : 1fr auto 1fr;
    align-items           : center;
    margin                : 8pt 0;
    padding               : 6pt 10pt;
    border                : 1pt solid #1a3a5c;
    background            : #f0f4f8;
    -webkit-print-color-adjust: exact;
    print-color-adjust    : exact;
  }

  .gov-doc-number {
    font-size  : 9pt;
    color      : #333333;
    text-align : right;
  }

  .gov-doc-title {
    font-size  : 13pt;
    font-weight: 800;
    color      : #1a3a5c;
    text-align : center;
    white-space: nowrap;
  }

  .gov-doc-date {
    font-size  : 9pt;
    color      : #333333;
    text-align : left;
  }

  /* سطر بيانات الوثيقة */
  .gov-doc-info-row {
    display    : flex !important;
    gap        : 20pt;
    padding    : 6pt 10pt;
    background : #f8fafc;
    border     : 1pt solid #dce4ef;
    border-top : none;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  .gov-doc-info-item {
    display  : flex;
    gap      : 5pt;
    flex     : 1;
  }

  .gov-label {
    font-size  : 9pt;
    font-weight: 700;
    color      : #1a3a5c;
    white-space: nowrap;
  }

  .gov-value {
    font-size  : 9pt;
    font-weight: 600;
    color      : #222222;
    border-bottom: 0.5pt solid #aaaaaa;
    flex       : 1;
    padding-bottom: 1pt;
  }

  /* خط فاصل مزدوج */
  .gov-divider-double {
    display      : block !important;
    border-top   : 3pt double #1a3a5c;
    margin       : 8pt 0 14pt;
  }

  /* ══ بيانات الموظف ══ */
  .employee-card {
    border           : 1.5pt solid #1a3a5c;
    border-radius    : 0;
    margin-bottom    : 12pt;
    page-break-inside: avoid;
  }

  .employee-header {
    background             : #1a3a5c !important;
    padding                : 12pt 16pt !important;
    -webkit-print-color-adjust: exact;
    print-color-adjust     : exact;
  }

  .emp-avatar { display: none; }
  .emp-name   { font-size: 14pt !important; color: #ffffff !important; }
  .emp-title  { font-size: 10pt !important; color: #c8d8e8 !important; }
  .emp-id-badge {
    background   : rgba(255,255,255,0.15) !important;
    border-color : rgba(255,255,255,0.4) !important;
    color        : #ffffff !important;
    font-size    : 10pt !important;
  }

  .details-grid    { border: 1pt solid #cccccc; }
  .detail-label    { font-size: 7.5pt; }
  .detail-value    { font-size: 10pt; }

  /* ══ الإحصاءات ══ */
  .stats-section   { page-break-inside: avoid; margin-bottom: 12pt; }
  .stats-header h3 { font-size: 11pt; color: #1a3a5c; }

  .stats-grid {
    grid-template-columns : repeat(3, 1fr);
    gap                   : 8pt;
  }

  .stat-card {
    border           : 1pt solid #cccccc;
    border-radius    : 0;
    padding          : 8pt;
    box-shadow       : none;
    page-break-inside: avoid;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  .stat-card::before { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .stat-value { font-size: 20pt; }
  .stat-label { font-size: 8pt; }

  /* ══ جدول الحضور ══ */
  .attendance-section { page-break-before: always; }

  .att-table { font-size: 9pt; }
  .att-table thead { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .att-table thead th { padding: 6pt 8pt; font-size: 8pt; }
  .att-table tbody td { padding: 5pt 8pt; }
  .att-table tbody tr:nth-child(even) { background: #f8f8f8 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }

  /* ══ التذييل الرسمي ══ */
  .print-footer {
    display          : block !important;
    margin-top       : 20pt;
    page-break-inside: avoid;
  }

  .gov-sign-bar {
    display    : grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap        : 16pt;
    text-align : center;
    margin-top : 10pt;
  }

  .gov-sign-box {
    border     : 1pt solid #1a3a5c;
    padding    : 8pt;
  }

  .gov-sign-title {
    font-size  : 9pt;
    font-weight: 700;
    color      : #1a3a5c;
    margin-bottom: 30pt;
    border-bottom: 0.5pt solid #999;
    padding-bottom: 4pt;
  }

  .gov-sign-name {
    font-size  : 8pt;
    color      : #333;
    margin-top : 4pt;
  }

  .gov-stamp-col {
