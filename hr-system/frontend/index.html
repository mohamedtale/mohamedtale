  <script>
    // Auth guard — redirect to login if no valid token
    (function() {
      var token = localStorage.getItem('hr_token');
      if (!token) { window.location.replace('/login.html'); return; }
      try {
        var exp = JSON.parse(atob(token.split('.')[1])).exp;
        if (exp * 1000 < Date.now()) {
          localStorage.removeItem('hr_token');
          localStorage.removeItem('hr_user');
          window.location.replace('/login.html');
        }
      } catch(e) { window.location.replace('/login.html'); }
    })();

    function doLogout() {
      fetch('/api/auth/logout', { method: 'POST' }).catch(function(){});
      localStorage.removeItem('hr_token');
      localStorage.removeItem('hr_user');
      window.location.replace('/login.html');
    }
  </script>

  <script>
    // ── Role-based nav visibility ──────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
      try {
        const user = JSON.parse(localStorage.getItem('hr_user') || '{}');
        if (user.role !== 'admin') {
          document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
        }
        // Set header user display
        const headerUser = document.getElementById('header-user');
        const headerAvatar = document.getElementById('header-avatar');
        if (headerUser && user.full_name) {
          headerUser.textContent = user.full_name;
        }
        if (headerAvatar && user.full_name) {
          headerAvatar.textContent = user.full_name.charAt(0);
        }
        const headerRole = document.getElementById('header-role');
        if (headerRole) {
          const roleMap = { admin: 'مدير النظام', manager: 'مشرف', staff: 'موظف' };
          headerRole.textContent = roleMap[user.role] || '';
        }
      } catch {}
    });

    // ── Notifications ──────────────────────────────────────────────────
    async function loadNotifications() {
      try {
        const res = await fetch('/api/notifications', {
          headers: { Authorization: 'Bearer ' + localStorage.getItem('hr_token') }
        });
        const data = await res.json();
        const notes = data?.data || [];
        const badge = document.getElementById('notif-badge');
        const list  = document.getElementById('notif-list');
        if (notes.length > 0) {
          badge.textContent = notes.length;
          badge.style.display = 'flex';
          list.innerHTML = notes.map(n => `
            <a href="${n.link || '#'}" data-close-notif="1"
               style="display:flex;align-items:flex-start;gap:10px;padding:10px 16px;
                      text-decoration:none;color:inherit;border-bottom:1px solid #f8f9fa;
                      transition:background .15s;">
              <span style="font-size:20px;">${n.icon}</span>
              <span style="font-size:13px;font-weight:600;color:#2d3748;line-height:1.5;">${n.text}</span>
            </a>`).join('');
        } else {
          badge.style.display = 'none';
          list.innerHTML = '<div style="padding:20px;text-align:center;color:#adb5bd;font-size:13px;">لا توجد إشعارات جديدة ✅</div>';
        }
      } catch {}
    }

    function toggleNotifications() {
      const dd = document.getElementById('notif-dropdown');
      dd.style.display = dd.style.display === 'none' ? 'block' : 'none';
      if (dd.style.display === 'block') loadNotifications();
    }

    function closeNotifications() {
      document.getElementById('notif-dropdown').style.display = 'none';
    }

    document.addEventListener('click', e => {
      if (!document.getElementById('notif-wrap')?.contains(e.target)) closeNotifications();
      if (e.target.closest('[data-close-notif]')) closeNotifications();
    });

    document.getElementById('notif-btn').addEventListener('click', toggleNotifications);
    document.getElementById('logout-btn').addEventListener('click', doLogout);

    // Load notifications every 2 minutes
    setTimeout(() => { loadNotifications(); setInterval(loadNotifications, 2 * 60 * 1000); }, 3000);
  </script>
