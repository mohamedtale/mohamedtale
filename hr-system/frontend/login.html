<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول — نظام الموارد البشرية</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Cairo', sans-serif;
      min-height: 100vh;
      display: flex;
      background: #f0f4f8;
    }

    /* ── BRAND PANEL (right) ── */
    .brand-panel {
      flex: 1;
      background: linear-gradient(145deg, #0d6080 0%, #0B4F6C 50%, #062e40 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 40px;
      position: relative;
      overflow: hidden;
    }

    .brand-panel::before,
    .brand-panel::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(0,168,204,0.12);
    }
    .brand-panel::before { width:500px;height:500px;top:-150px;right:-120px; }
    .brand-panel::after  { width:350px;height:350px;bottom:-80px;left:-60px; }

    .brand-logo {
      width: 130px; height: 130px;
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 32px;
      position: relative; z-index: 1;
      animation: float 4s ease-in-out infinite;
    }
    .brand-logo svg { width:72px; height:72px; filter: drop-shadow(0 0 18px rgba(0,168,204,0.8)); }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-10px); }
    }

    .brand-title {
      font-size: 26px; font-weight: 900; color: #fff;
      text-align: center; line-height: 1.5; margin-bottom: 16px;
      position: relative; z-index: 1;
    }
    .brand-divider {
      width: 70px; height: 3px;
      background: linear-gradient(90deg, #00A8CC, #D4A843);
      border-radius: 2px; margin: 0 auto 16px;
      position: relative; z-index: 1;
    }
    .brand-sub {
      font-size: 15px; color: rgba(255,255,255,0.55);
      font-weight: 600; position: relative; z-index: 1;
    }

    /* Floating particles */
    .particle {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,168,204,0.25), transparent);
      animation: rise linear infinite;
    }
    @keyframes rise {
      0%   { transform: translateY(100vh) scale(0); opacity:0; }
      10%  { opacity:.8; }
      90%  { opacity:.4; }
      100% { transform: translateY(-10vh) scale(1.3); opacity:0; }
    }

    /* ── FORM PANEL (left) ── */
    .form-panel {
      width: 420px; min-width: 320px;
      background: #fff;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 60px 44px;
      box-shadow: -6px 0 30px rgba(0,0,0,0.1);
    }
    .form-inner { width: 100%; max-width: 320px; }

    .form-heading { font-size:26px; font-weight:900; color:#0B4F6C; margin-bottom:4px; }
    .form-subheading { font-size:13px; color:#8a9bb0; font-weight:500; margin-bottom:32px; }

    .form-group { margin-bottom: 18px; }
    label { display:block; font-size:12px; font-weight:700; color:#4a5568; margin-bottom:6px; }

    .input-wrap { position: relative; }
    .input-icon {
      position:absolute; right:13px; top:50%; transform:translateY(-50%);
      color:#b0bec5; display:flex; align-items:center; pointer-events:none;
    }
    input[type="text"], input[type="password"] {
      width:100%; padding:12px 44px 12px 44px;
      border:1.5px solid #e2e8f0; border-radius:10px;
      font-family:'Cairo',sans-serif; font-size:15px; color:#2d3748;
      background:#f7fafc; transition:border-color .2s, box-shadow .2s, background .2s;
    }
    input:focus {
      outline:none; border-color:#00A8CC; background:#fff;
      box-shadow:0 0 0 4px rgba(0,168,204,.1);
    }
    .toggle-pass {
      position:absolute; left:13px; top:50%; transform:translateY(-50%);
      background:none; border:none; cursor:pointer; color:#b0bec5;
      display:flex; align-items:center; transition:color .2s;
    }
    .toggle-pass:hover { color:#0B4F6C; }

    .btn-login {
      width:100%; padding:13px;
      background:linear-gradient(135deg,#0B4F6C,#00A8CC);
      color:white; border:none; border-radius:10px;
      font-family:'Cairo',sans-serif; font-size:16px; font-weight:800;
      cursor:pointer; margin-top:6px;
      display:flex; align-items:center; justify-content:center; gap:8px;
      box-shadow:0 4px 16px rgba(0,168,204,.3);
      transition:opacity .2s, transform .1s, box-shadow .2s;
    }
    .btn-login:hover { opacity:.92; box-shadow:0 6px 22px rgba(0,168,204,.4); }
    .btn-login:active { transform:scale(.98); }
    .btn-login:disabled { opacity:.6; cursor:not-allowed; }

    .spinner {
      width:20px; height:20px;
      border:3px solid rgba(255,255,255,.35);
      border-top-color:white; border-radius:50%;
      animation:spin .7s linear infinite; display:none;
    }
    .btn-login.loading .spinner { display:block; }
    .btn-login.loading .btn-text { display:none; }
    @keyframes spin { to { transform:rotate(360deg); } }

    .error-msg {
      background:#fff5f5; color:#c53030;
      border:1px solid #fed7d7; border-radius:8px;
      padding:10px 14px; font-size:13px; font-weight:600;
      margin-bottom:14px; display:none; text-align:center;
    }
    .error-msg.visible { display:block; }

    .form-footer {
      text-align:center; margin-top:24px;
      padding-top:16px; border-top:1px solid #edf2f7;
      font-size:12px; color:#a0aec0;
    }
    .form-footer strong { color:#718096; }

    @media (max-width:700px) {
      body { flex-direction:column; }
      .brand-panel { padding:40px 24px; flex:none; min-height:280px; }
      .brand-logo { width:90px; height:90px; }
      .brand-logo svg { width:50px; height:50px; }
      .brand-title { font-size:20px; }
      .form-panel { width:100%; min-width:unset; box-shadow:none; }
    }
  </style>
</head>
<body>

<!-- BRAND -->
<div class="brand-panel" id="brand-panel">
  <div id="particles"></div>
  <div class="brand-logo">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
      <path d="M32 4C32 4 12 26 12 40C12 52 21 60 32 60C43 60 52 52 52 40C52 26 32 4 32 4Z" fill="#00A8CC"/>
      <path d="M32 20C32 20 20 34 20 41C20 48 25.5 53 32 53C38.5 53 44 48 44 41C44 34 32 20 32 20Z" fill="rgba(255,255,255,0.15)"/>
      <ellipse cx="25" cy="38" rx="3.5" ry="6" fill="rgba(255,255,255,0.55)" transform="rotate(-22 25 38)"/>
    </svg>
  </div>
  <div class="brand-title">الجهاز التنفيذي<br>لحفر وصيانة آبار المياه</div>
  <div class="brand-divider"></div>
  <div class="brand-sub">نظام إدارة الموارد البشرية</div>
</div>

<!-- FORM -->
<div class="form-panel">
  <div class="form-inner">
    <div class="form-heading">مرحباً بك 👋</div>
    <div class="form-subheading">أدخل بيانات حسابك للمتابعة</div>

    <div class="error-msg" id="error-msg"></div>

    <form id="login-form">
      <div class="form-group">
        <label for="username">اسم المستخدم</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
              <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
            </svg>
          </span>
          <input type="text" id="username" placeholder="أدخل اسم المستخدم" autocomplete="username" autofocus required>
        </div>
      </div>

      <div class="form-group">
        <label for="password">كلمة المرور</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
              <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
            </svg>
          </span>
          <input type="password" id="password" placeholder="أدخل كلمة المرور" autocomplete="current-password" required>
          <button type="button" class="toggle-pass" id="toggle-pass-btn">
            <svg id="eye-icon" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
              <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-login" id="login-btn">
        <span class="btn-text">تسجيل الدخول</span>
        <div class="spinner"></div>
      </button>
    </form>

    <div class="form-footer">
      بيانات الدخول الافتراضية: <strong>admin</strong> / <strong>password</strong>
    </div>
  </div>
</div>

<script>
  // Particles
  const pc = document.getElementById('particles');
  for (let i = 0; i < 14; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const s = 30 + Math.random() * 100;
    p.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}%;animation-duration:${9+Math.random()*12}s;animation-delay:${-Math.random()*12}s;`;
    pc.appendChild(p);
  }

  // Redirect if already logged in
  (function() {
    var t = localStorage.getItem('hr_token');
    if (!t) return;
    try {
      var p = JSON.parse(atob(t.split('.')[1]));
      if (p.exp * 1000 > Date.now()) window.location.replace('/');
      else { localStorage.removeItem('hr_token'); localStorage.removeItem('hr_user'); }
    } catch(e) {}
  })();

  function togglePass() {
    var inp = document.getElementById('password');
    var icon = document.getElementById('eye-icon');
    if (inp.type === 'password') {
      inp.type = 'text';
      icon.innerHTML = '<path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/>';
    } else {
      inp.type = 'password';
      icon.innerHTML = '<path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>';
    }
  }

  document.getElementById('login-form').addEventListener('submit', function(e) { doLogin(e); });
  document.getElementById('toggle-pass-btn').addEventListener('click', togglePass);

  async function doLogin(e) {
    e.preventDefault();
    var errEl = document.getElementById('error-msg');
    errEl.classList.remove('visible');
    var username = document.getElementById('username').value.trim();
    var password = document.getElementById('password').value;
    var btn = document.getElementById('login-btn');
    btn.disabled = true;
    btn.classList.add('loading');
    try {
      var res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      var data = await res.json();
      if (!res.ok) { errEl.textContent = data.error || 'فشل تسجيل الدخول'; errEl.classList.add('visible'); return; }
      localStorage.setItem('hr_token', data.token);
      localStorage.setItem('hr_user', JSON.stringify(data.user));
      window.location.replace('/');
    } catch(err) {
      errEl.textContent = 'تعذر الاتصال بالخادم';
      errEl.classList.add('visible');
    } finally {
      btn.disabled = false;
      btn.classList.remove('loading');
    }
  }
</script>
<script src="js/screenshot-guard.js"></script>
</body>
</html>
