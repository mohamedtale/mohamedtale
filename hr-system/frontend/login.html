<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول — نظام الموارد البشرية</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0B4F6C;
      --teal: #00A8CC;
      --gold: #D4A843;
    }

    body {
      font-family: 'Cairo', sans-serif;
      min-height: 100vh;
      background: #0a0a0a;
      overflow: hidden;
      display: flex;
    }

    /* ═══════════════════════════════════════
       SCENE — 3D perspective container
    ═══════════════════════════════════════ */
    #scene {
      width: 100vw;
      height: 100vh;
      perspective: 1400px;
      perspective-origin: 50% 50%;
      position: relative;
    }

    /* ═══════════════════════════════════════
       BRAND PANEL — starts full-screen
    ═══════════════════════════════════════ */
    #brand {
      position: absolute;
      inset: 0;
      background: linear-gradient(145deg, #0d6080 0%, #0B4F6C 40%, #062e40 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transform-origin: right center;
      transition: none;
      will-change: transform, width, opacity;
      overflow: hidden;
    }

    /* Animated background particles */
    .particles {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .particle {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,168,204,0.3), transparent);
      animation: float linear infinite;
    }

    @keyframes float {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 0.6; }
      100% { transform: translateY(-20vh) scale(1.5); opacity: 0; }
    }

    /* Big decorative rings */
    .ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(0,168,204,0.12);
      animation: pulse-ring 4s ease-in-out infinite;
    }
    .ring-1 { width: 600px; height: 600px; top: -200px; right: -150px; animation-delay: 0s; }
    .ring-2 { width: 400px; height: 400px; bottom: -100px; left: -80px; animation-delay: 1.5s; }
    .ring-3 { width: 200px; height: 200px; top: 60%; left: 10%; animation-delay: 0.8s; }

    @keyframes pulse-ring {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50%       { transform: scale(1.05); opacity: 1; }
    }

    /* ── Logo ── */
    #logo-btn {
      position: relative;
      z-index: 2;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: rgba(255,255,255,0.07);
      border: 2px solid rgba(255,255,255,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      margin-bottom: 40px;
      transition: transform 0.4s cubic-bezier(.34,1.56,.64,1), box-shadow 0.4s;
      backdrop-filter: blur(6px);
      -webkit-tap-highlight-color: transparent;
    }

    #logo-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 0 60px rgba(0,168,204,0.5), 0 0 120px rgba(0,168,204,0.2);
    }

    /* Orbit ring around logo */
    #logo-btn::before {
      content: '';
      position: absolute;
      width: 190px;
      height: 190px;
      border-radius: 50%;
      border: 1.5px dashed rgba(0,168,204,0.3);
      animation: orbit 8s linear infinite;
    }
    #logo-btn::after {
      content: '';
      position: absolute;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      border: 1px solid rgba(212,168,67,0.15);
      animation: orbit 12s linear infinite reverse;
    }

    @keyframes orbit {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    #logo-btn svg {
      width: 88px;
      height: 88px;
      filter: drop-shadow(0 0 20px rgba(0,168,204,0.7));
      animation: glow-pulse 3s ease-in-out infinite;
    }

    @keyframes glow-pulse {
      0%, 100% { filter: drop-shadow(0 0 20px rgba(0,168,204,0.7)); }
      50%       { filter: drop-shadow(0 0 36px rgba(0,168,204,1)) drop-shadow(0 0 60px rgba(0,168,204,0.4)); }
    }

    .click-hint {
      position: absolute;
      bottom: -36px;
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      white-space: nowrap;
      animation: blink 2s ease-in-out infinite;
      font-weight: 600;
      letter-spacing: 1px;
    }

    @keyframes blink {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 1; }
    }

    .brand-title {
      position: relative;
      z-index: 2;
      font-size: 30px;
      font-weight: 900;
      color: #fff;
      text-align: center;
      line-height: 1.5;
      text-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }

    .brand-divider {
      width: 80px;
      height: 3px;
      background: linear-gradient(90deg, var(--teal), var(--gold));
      border-radius: 2px;
      margin: 20px auto;
      position: relative;
      z-index: 2;
    }

    .brand-sub {
      position: relative;
      z-index: 2;
      font-size: 16px;
      color: rgba(255,255,255,0.55);
      font-weight: 600;
    }

    /* ═══════════════════════════════════════
       FORM PANEL — hidden initially
    ═══════════════════════════════════════ */
    #form-panel {
      position: absolute;
      top: 0; left: 0;
      width: 440px;
      height: 100vh;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 48px;
      z-index: 5;
      transform: perspective(1200px) rotateY(-90deg) translateX(-80px);
      transform-origin: left center;
      opacity: 0;
      pointer-events: none;
      transition: none;
    }

    .form-inner { width: 100%; max-width: 320px; }

    .form-heading {
      font-size: 28px;
      font-weight: 900;
      color: var(--navy);
      margin-bottom: 4px;
    }

    .form-subheading {
      font-size: 14px;
      color: #8a9bb0;
      font-weight: 500;
      margin-bottom: 36px;
    }

    .form-group { margin-bottom: 20px; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: #4a5568;
      margin-bottom: 8px;
    }

    .input-wrap { position: relative; }

    .input-icon {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #b0bec5;
      display: flex;
      align-items: center;
      pointer-events: none;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 13px 46px 13px 46px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-family: 'Cairo', sans-serif;
      font-size: 15px;
      color: #2d3748;
      background: #f7fafc;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    input:focus {
      outline: none;
      border-color: var(--teal);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(0,168,204,0.10);
    }

    .toggle-pass {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #b0bec5;
      padding: 0;
      display: flex;
      align-items: center;
      transition: color 0.2s;
    }
    .toggle-pass:hover { color: var(--navy); }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--navy) 0%, var(--teal) 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-family: 'Cairo', sans-serif;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s;
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 18px rgba(0,168,204,0.35);
    }
    .btn-login:hover { opacity: 0.92; box-shadow: 0 6px 24px rgba(0,168,204,0.45); }
    .btn-login:active { transform: scale(0.98); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

    .spinner {
      width: 20px; height: 20px;
      border: 3px solid rgba(255,255,255,0.35);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .btn-login.loading .spinner { display: block; }
    .btn-login.loading .btn-text { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      background: #fff5f5;
      color: #c53030;
      border: 1px solid #fed7d7;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 16px;
      display: none;
      text-align: center;
    }
    .error-msg.visible { display: block; }

    .form-footer {
      text-align: center;
      margin-top: 28px;
      padding-top: 18px;
      border-top: 1px solid #edf2f7;
      font-size: 12px;
      color: #a0aec0;
    }
    .form-footer strong { color: #718096; }

    /* ═══════════════════════════════════════
       ANIMATION STATES
    ═══════════════════════════════════════ */
    body.revealed #brand {
      animation: brand-fold 1.1s cubic-bezier(.77,0,.18,1) forwards;
    }

    @keyframes brand-fold {
      0%   {
        width: 100%;
        transform: perspective(1400px) rotateY(0deg);
        border-radius: 0;
      }
      35%  {
        transform: perspective(1400px) rotateY(-12deg) translateZ(60px);
        border-radius: 0;
      }
      70%  {
        width: 100%;
        transform: perspective(1400px) rotateY(0deg) translateX(0);
      }
      100% {
        width: calc(100% - 440px);
        transform: perspective(1400px) rotateY(0deg) translateX(0);
        left: 440px;
        border-radius: 0;
      }
    }

    body.revealed #form-panel {
      animation: form-unfold 1s cubic-bezier(.34,1.1,.64,1) 0.45s forwards;
      pointer-events: auto;
    }

    @keyframes form-unfold {
      0%   {
        transform: perspective(1200px) rotateY(-90deg) translateX(-60px);
        opacity: 0;
      }
      50%  {
        opacity: 1;
      }
      100% {
        transform: perspective(1200px) rotateY(0deg) translateX(0);
        opacity: 1;
      }
    }

    /* Ripple on logo click */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(0,168,204,0.35);
      transform: scale(0);
      animation: ripple-out 0.8s ease-out forwards;
      pointer-events: none;
    }
    @keyframes ripple-out {
      to { transform: scale(8); opacity: 0; }
    }

    /* Mobile */
    @media (max-width: 768px) {
      #form-panel { width: 100%; }
      body.revealed #brand { animation: brand-fold-mobile 1s cubic-bezier(.77,0,.18,1) forwards; }
      body.revealed #form-panel { animation: form-unfold-mobile 1s cubic-bezier(.34,1.1,.64,1) 0.4s forwards; }

      @keyframes brand-fold-mobile {
        0%   { height: 100vh; transform: perspective(900px) rotateX(0); }
        40%  { transform: perspective(900px) rotateX(-10deg); }
        100% { height: 45vh; transform: perspective(900px) rotateX(0); top: 55vh; }
      }
      @keyframes form-unfold-mobile {
        0%   { transform: perspective(900px) rotateX(90deg) translateY(-40px); opacity: 0; top: 0; height: 55vh; }
        100% { transform: perspective(900px) rotateX(0) translateY(0); opacity: 1; top: 0; height: 55vh; }
      }
    }
  </style>
</head>
<body>

<div id="scene">

  <!-- ── BRAND PANEL ── -->
  <div id="brand">

    <div class="particles" id="particles"></div>
    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>
    <div class="ring ring-3"></div>

    <div id="logo-btn" onclick="revealForm(event)" role="button" tabindex="0" aria-label="انقر للدخول">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
        <path d="M32 4 C32 4 12 26 12 40 C12 52 21 60 32 60 C43 60 52 52 52 40 C52 26 32 4 32 4 Z"
              fill="#00A8CC"/>
        <path d="M32 20 C32 20 20 34 20 41 C20 48 25.5 53 32 53 C38.5 53 44 48 44 41 C44 34 32 20 32 20 Z"
              fill="rgba(255,255,255,0.15)"/>
        <ellipse cx="25" cy="38" rx="3.5" ry="6" fill="rgba(255,255,255,0.55)"
                 transform="rotate(-22 25 38)"/>
        <ellipse cx="30" cy="26" rx="1.5" ry="3" fill="rgba(255,255,255,0.35)"
                 transform="rotate(-10 30 26)"/>
      </svg>
      <span class="click-hint">انقر للدخول ←</span>
    </div>

    <div class="brand-title">
      الجهاز التنفيذي<br>لحفر وصيانة آبار المياه
    </div>
    <div class="brand-divider"></div>
    <div class="brand-sub">نظام إدارة الموارد البشرية</div>

  </div>

  <!-- ── FORM PANEL ── -->
  <div id="form-panel">
    <div class="form-inner">

      <div class="form-heading">مرحباً بك 👋</div>
      <div class="form-subheading">أدخل بيانات حسابك للمتابعة</div>

      <div class="error-msg" id="error-msg"></div>

      <form id="login-form" onsubmit="doLogin(event)">
        <div class="form-group">
          <label for="username">اسم المستخدم</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
              </svg>
            </span>
            <input type="text" id="username" placeholder="أدخل اسم المستخدم" autocomplete="username" required>
          </div>
        </div>

        <div class="form-group">
          <label for="password">كلمة المرور</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
              </svg>
            </span>
            <input type="password" id="password" placeholder="أدخل كلمة المرور" autocomplete="current-password" required>
            <button type="button" class="toggle-pass" onclick="togglePass()" id="pass-eye" title="إظهار/إخفاء">
              <svg id="eye-icon" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-login" id="login-btn">
          <span class="btn-text">تسجيل الدخول</span>
          <div class="spinner"></div>
        </button>
      </form>

      <div class="form-footer">
        بيانات الدخول الافتراضية: <strong>admin</strong> / <strong>password</strong>
      </div>
    </div>
  </div>

</div><!-- /#scene -->

<script>
  /* ── redirect if already logged in ── */
  if (localStorage.getItem('hr_token')) {
    try {
      const p = JSON.parse(atob(localStorage.getItem('hr_token').split('.')[1]));
      if (p.exp * 1000 > Date.now()) window.location.replace('/');
      else { localStorage.removeItem('hr_token'); localStorage.removeItem('hr_user'); }
    } catch {}
  }

  /* ── floating particles ── */
  (function spawnParticles() {
    const container = document.getElementById('particles');
    for (let i = 0; i < 18; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = 40 + Math.random() * 120;
      p.style.cssText = `
        width:${size}px; height:${size}px;
        left:${Math.random()*100}%;
        animation-duration:${8 + Math.random()*14}s;
        animation-delay:${-Math.random()*14}s;
      `;
      container.appendChild(p);
    }
  })();

  /* ── keyboard support ── */
  document.getElementById('logo-btn').addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') revealForm(e);
  });

  /* ── 3D reveal ── */
  let revealed = false;
  function revealForm(e) {
    if (revealed) return;
    revealed = true;

    // Ripple effect on logo
    const btn = document.getElementById('logo-btn');
    const ripple = document.createElement('div');
    ripple.className = 'ripple';
    ripple.style.cssText = 'width:40px;height:40px;left:calc(50% - 20px);top:calc(50% - 20px);';
    btn.appendChild(ripple);
    setTimeout(() => ripple.remove(), 900);

    // Trigger animation
    document.body.classList.add('revealed');

    // Focus username after animation
    setTimeout(() => {
      document.getElementById('username').focus();
    }, 1100);
  }

  /* ── toggle password ── */
  function togglePass() {
    const inp = document.getElementById('password');
    const icon = document.getElementById('eye-icon');
    if (inp.type === 'password') {
      inp.type = 'text';
      icon.innerHTML = '<path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/>';
    } else {
      inp.type = 'password';
      icon.innerHTML = '<path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>';
    }
  }

  /* ── error helpers ── */
  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.classList.add('visible');
  }
  function hideError() {
    document.getElementById('error-msg').classList.remove('visible');
  }

  /* ── login submit ── */
  async function doLogin(e) {
    e.preventDefault();
    hideError();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('login-btn');
    btn.disabled = true;
    btn.classList.add('loading');
    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (!res.ok) { showError(data.error || 'فشل تسجيل الدخول'); return; }
      localStorage.setItem('hr_token', data.token);
      localStorage.setItem('hr_user', JSON.stringify(data.user));
      window.location.replace('/');
    } catch {
      showError('تعذر الاتصال بالخادم');
    } finally {
      btn.disabled = false;
      btn.classList.remove('loading');
    }
  }
</script>
</body>
</html>
