<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول — نظام الموارد البشرية</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(135deg, #0B4F6C 0%, #083a51 50%, #00A8CC 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-wrapper {
      width: 100%;
      max-width: 420px;
    }

    /* Header */
    .login-header {
      text-align: center;
      margin-bottom: 32px;
      color: white;
    }

    .logo-icon {
      width: 80px;
      height: 80px;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 40px;
      backdrop-filter: blur(8px);
      border: 2px solid rgba(255,255,255,0.2);
    }

    .org-name {
      font-size: 15px;
      font-weight: 700;
      color: rgba(255,255,255,0.9);
      line-height: 1.6;
      margin-bottom: 6px;
    }

    .system-name {
      font-size: 22px;
      font-weight: 800;
      color: #D4A843;
    }

    /* Card */
    .login-card {
      background: white;
      border-radius: 16px;
      padding: 36px 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .card-title {
      font-size: 20px;
      font-weight: 800;
      color: #0B4F6C;
      text-align: center;
      margin-bottom: 28px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: #6c757d;
      margin-bottom: 8px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
      pointer-events: none;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 12px 44px 12px 44px;
      border: 2px solid #e9ecef;
      border-radius: 10px;
      font-family: 'Cairo', sans-serif;
      font-size: 15px;
      color: #343a40;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: #f8f9fa;
    }

    input:focus {
      outline: none;
      border-color: #00A8CC;
      background: white;
      box-shadow: 0 0 0 4px rgba(0,168,204,0.12);
    }

    .toggle-pass {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
      color: #adb5bd;
      padding: 0;
    }

    .toggle-pass:hover { color: #0B4F6C; }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #0B4F6C, #00A8CC);
      color: white;
      border: none;
      border-radius: 10px;
      font-family: 'Cairo', sans-serif;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-login:hover { opacity: 0.92; }
    .btn-login:active { transform: scale(0.98); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

    .error-msg {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 18px;
      display: none;
      text-align: center;
    }

    .error-msg.visible { display: block; }

    .default-hint {
      text-align: center;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid #e9ecef;
      font-size: 12px;
      color: #adb5bd;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .btn-login.loading .spinner { display: block; }
    .btn-login.loading .btn-text { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Footer */
    .login-footer {
      text-align: center;
      margin-top: 20px;
      color: rgba(255,255,255,0.5);
      font-size: 12px;
    }
  </style>
</head>
<body>

<div class="login-wrapper">

  <div class="login-header">
    <div class="logo-icon">💧</div>
    <div class="org-name">الجهاز التنفيذي لحفر وصيانة<br>آبار المياه</div>
    <div class="system-name">نظام إدارة الموارد البشرية</div>
  </div>

  <div class="login-card">
    <div class="card-title">🔐 تسجيل الدخول</div>

    <div class="error-msg" id="error-msg"></div>

    <form id="login-form" onsubmit="doLogin(event)">
      <div class="form-group">
        <label for="username">اسم المستخدم</label>
        <div class="input-wrapper">
          <span class="input-icon">👤</span>
          <input type="text" id="username" placeholder="أدخل اسم المستخدم" autocomplete="username" autofocus required>
        </div>
      </div>

      <div class="form-group">
        <label for="password">كلمة المرور</label>
        <div class="input-wrapper">
          <span class="input-icon">🔑</span>
          <input type="password" id="password" placeholder="أدخل كلمة المرور" autocomplete="current-password" required>
          <button type="button" class="toggle-pass" onclick="togglePass()" id="pass-eye">👁️</button>
        </div>
      </div>

      <button type="submit" class="btn-login" id="login-btn">
        <span class="btn-text">دخول →</span>
        <div class="spinner"></div>
      </button>
    </form>

    <div class="default-hint">
      بيانات الدخول الافتراضية: <strong>admin</strong> / <strong>password</strong>
    </div>
  </div>

  <div class="login-footer">نظام إدارة الموارد البشرية &mdash; v1.0</div>
</div>

<script>
  // Redirect if already logged in
  if (localStorage.getItem('hr_token')) {
    try {
      const payload = JSON.parse(atob(localStorage.getItem('hr_token').split('.')[1]));
      if (payload.exp * 1000 > Date.now()) {
        window.location.replace('/');
      } else {
        localStorage.removeItem('hr_token');
        localStorage.removeItem('hr_user');
      }
    } catch {}
  }

  function togglePass() {
    const inp = document.getElementById('password');
    const eye = document.getElementById('pass-eye');
    if (inp.type === 'password') {
      inp.type = 'text';
      eye.textContent = '🙈';
    } else {
      inp.type = 'password';
      eye.textContent = '👁️';
    }
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.classList.add('visible');
  }

  function hideError() {
    document.getElementById('error-msg').classList.remove('visible');
  }

  async function doLogin(e) {
    e.preventDefault();
    hideError();

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('login-btn');

    btn.disabled = true;
    btn.classList.add('loading');

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (!res.ok) {
        showError(data.error || 'فشل تسجيل الدخول');
        return;
      }
      localStorage.setItem('hr_token', data.token);
      localStorage.setItem('hr_user', JSON.stringify(data.user));
      window.location.replace('/');
    } catch {
      showError('تعذر الاتصال بالخادم');
    } finally {
      btn.disabled = false;
      btn.classList.remove('loading');
    }
  }
</script>
</body>
</html>
