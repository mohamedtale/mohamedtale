<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول — نظام الموارد البشرية</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Cairo', sans-serif;
      min-height: 100vh;
      display: flex;
      background: #f0f4f8;
    }

    /* ── BRANDING PANEL (right side in RTL) ── */
    .brand-panel {
      flex: 1;
      background: linear-gradient(160deg, #0B4F6C 0%, #083a51 60%, #062e40 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 48px;
      position: relative;
      overflow: hidden;
    }

    /* decorative circles */
    .brand-panel::before {
      content: '';
      position: absolute;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      background: rgba(0,168,204,0.08);
      top: -100px;
      right: -100px;
    }
    .brand-panel::after {
      content: '';
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: rgba(0,168,204,0.06);
      bottom: -80px;
      left: -60px;
    }

    .brand-logo {
      width: 120px;
      height: 120px;
      background: rgba(255,255,255,0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 32px;
      border: 2px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(4px);
      position: relative;
      z-index: 1;
    }

    .brand-logo svg {
      width: 64px;
      height: 64px;
    }

    .brand-title {
      font-size: 26px;
      font-weight: 900;
      color: #ffffff;
      text-align: center;
      line-height: 1.5;
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
    }

    .brand-subtitle {
      font-size: 15px;
      font-weight: 600;
      color: rgba(255,255,255,0.55);
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .brand-divider {
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, #00A8CC, #D4A843);
      border-radius: 2px;
      margin: 24px auto;
      position: relative;
      z-index: 1;
    }

    .brand-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,168,204,0.18);
      border: 1px solid rgba(0,168,204,0.3);
      color: #7de0f5;
      border-radius: 999px;
      padding: 8px 20px;
      font-size: 13px;
      font-weight: 700;
      position: relative;
      z-index: 1;
      margin-top: 8px;
    }

    /* ── FORM PANEL (left side in RTL) ── */
    .form-panel {
      width: 440px;
      min-width: 340px;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 48px;
      box-shadow: -8px 0 40px rgba(0,0,0,0.08);
    }

    .form-inner {
      width: 100%;
      max-width: 340px;
    }

    .form-heading {
      font-size: 28px;
      font-weight: 900;
      color: #0B4F6C;
      margin-bottom: 6px;
    }

    .form-subheading {
      font-size: 14px;
      font-weight: 500;
      color: #8a9bb0;
      margin-bottom: 36px;
    }

    .form-group {
      margin-bottom: 22px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: #4a5568;
      margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
    }

    .input-icon {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #b0bec5;
      display: flex;
      align-items: center;
      pointer-events: none;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 13px 46px 13px 46px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-family: 'Cairo', sans-serif;
      font-size: 15px;
      color: #2d3748;
      background: #f7fafc;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    input:focus {
      outline: none;
      border-color: #00A8CC;
      background: #fff;
      box-shadow: 0 0 0 4px rgba(0,168,204,0.10);
    }

    .toggle-pass {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #b0bec5;
      padding: 0;
      display: flex;
      align-items: center;
      transition: color 0.2s;
    }
    .toggle-pass:hover { color: #0B4F6C; }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #0B4F6C 0%, #00A8CC 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-family: 'Cairo', sans-serif;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s;
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 16px rgba(0,168,204,0.3);
    }

    .btn-login:hover {
      opacity: 0.93;
      box-shadow: 0 6px 20px rgba(0,168,204,0.4);
    }
    .btn-login:active { transform: scale(0.98); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

    .error-msg {
      background: #fff5f5;
      color: #c53030;
      border: 1px solid #fed7d7;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 18px;
      display: none;
      text-align: center;
    }
    .error-msg.visible { display: block; }

    .spinner {
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.35);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .btn-login.loading .spinner { display: block; }
    .btn-login.loading .btn-text { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .form-footer {
      text-align: center;
      margin-top: 32px;
      padding-top: 20px;
      border-top: 1px solid #edf2f7;
      font-size: 12px;
      color: #a0aec0;
    }
    .form-footer strong { color: #718096; }

    /* Mobile */
    @media (max-width: 768px) {
      body { flex-direction: column; }
      .brand-panel {
        padding: 40px 24px;
        flex: none;
      }
      .brand-logo { width: 90px; height: 90px; }
      .brand-logo svg { width: 48px; height: 48px; }
      .brand-title { font-size: 20px; }
      .form-panel {
        width: 100%;
        min-width: unset;
        padding: 40px 24px;
        box-shadow: none;
      }
    }
  </style>
</head>
<body>

<!-- ── BRANDING PANEL ── -->
<div class="brand-panel">
  <div class="brand-logo">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
      <path d="M32 4 C32 4 14 24 14 38 C14 50 22 58 32 58 C42 58 50 50 50 38 C50 24 32 4 32 4 Z"
            fill="#00A8CC" opacity="0.95"/>
      <path d="M32 18 C32 18 22 30 22 38 C22 44 26.5 48 32 48 C37.5 48 42 44 42 38 C42 30 32 18 32 18 Z"
            fill="#ffffff" opacity="0.2"/>
      <ellipse cx="26" cy="35" rx="3" ry="5.5" fill="#ffffff" opacity="0.5"
               transform="rotate(-20 26 35)"/>
    </svg>
  </div>

  <div class="brand-title">
    الجهاز التنفيذي<br>لحفر وصيانة آبار المياه
  </div>

  <div class="brand-divider"></div>

  <div class="brand-subtitle">نظام إدارة الموارد البشرية المتكامل</div>

  <div class="brand-badge">
    <svg viewBox="0 0 20 20" fill="currentColor" width="14" height="14">
      <path fill-rule="evenodd" d="M10 1a4.5 4.5 0 00-4.5 4.5V9H5a2 2 0 00-2 2v6a2 2 0 002 2h10a2 2 0 002-2v-6a2 2 0 00-2-2h-.5V5.5A4.5 4.5 0 0010 1zm3 8V5.5a3 3 0 10-6 0V9h6z" clip-rule="evenodd"/>
    </svg>
    دخول آمن ومشفّر
  </div>
</div>

<!-- ── FORM PANEL ── -->
<div class="form-panel">
  <div class="form-inner">

    <div class="form-heading">مرحباً بك 👋</div>
    <div class="form-subheading">أدخل بيانات حسابك للمتابعة</div>

    <div class="error-msg" id="error-msg"></div>

    <form id="login-form" onsubmit="doLogin(event)">
      <div class="form-group">
        <label for="username">اسم المستخدم</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
              <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
            </svg>
          </span>
          <input type="text" id="username" placeholder="أدخل اسم المستخدم" autocomplete="username" autofocus required>
        </div>
      </div>

      <div class="form-group">
        <label for="password">كلمة المرور</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
              <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
            </svg>
          </span>
          <input type="password" id="password" placeholder="أدخل كلمة المرور" autocomplete="current-password" required>
          <button type="button" class="toggle-pass" onclick="togglePass()" id="pass-eye" title="إظهار/إخفاء كلمة المرور">
            <svg id="eye-icon" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
              <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-login" id="login-btn">
        <span class="btn-text">تسجيل الدخول</span>
        <div class="spinner"></div>
      </button>
    </form>

    <div class="form-footer">
      بيانات الدخول الافتراضية: <strong>admin</strong> / <strong>password</strong>
    </div>
  </div>
</div>

<script>
  if (localStorage.getItem('hr_token')) {
    try {
      const payload = JSON.parse(atob(localStorage.getItem('hr_token').split('.')[1]));
      if (payload.exp * 1000 > Date.now()) {
        window.location.replace('/');
      } else {
        localStorage.removeItem('hr_token');
        localStorage.removeItem('hr_user');
      }
    } catch {}
  }

  function togglePass() {
    const inp = document.getElementById('password');
    const icon = document.getElementById('eye-icon');
    if (inp.type === 'password') {
      inp.type = 'text';
      icon.innerHTML = '<path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/>';
    } else {
      inp.type = 'password';
      icon.innerHTML = '<path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>';
    }
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.classList.add('visible');
  }

  function hideError() {
    document.getElementById('error-msg').classList.remove('visible');
  }

  async function doLogin(e) {
    e.preventDefault();
    hideError();

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('login-btn');

    btn.disabled = true;
    btn.classList.add('loading');

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (!res.ok) {
        showError(data.error || 'فشل تسجيل الدخول');
        return;
      }
      localStorage.setItem('hr_token', data.token);
      localStorage.setItem('hr_user', JSON.stringify(data.user));
      window.location.replace('/');
    } catch {
      showError('تعذر الاتصال بالخادم');
    } finally {
      btn.disabled = false;
      btn.classList.remove('loading');
    }
  }
</script>
</body>
</html>
