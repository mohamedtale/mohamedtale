<div class="page-header">
  <h1 class="page-title">الملف الشخصي</h1>
</div>

<div style="max-width:500px;">
  <div class="card" style="margin-bottom:20px;">
    <h3 style="font-size:16px;font-weight:800;color:#0B4F6C;margin-bottom:20px;">معلومات الحساب</h3>
    <div id="profile-info" style="display:flex;flex-direction:column;gap:12px;"></div>
  </div>

  <div class="card">
    <h3 style="font-size:16px;font-weight:800;color:#0B4F6C;margin-bottom:20px;">🔑 تغيير كلمة المرور</h3>
    <div class="form-group">
      <label>كلمة المرور الحالية</label>
      <input type="password" id="cp-current" class="form-control" placeholder="أدخل كلمة المرور الحالية">
    </div>
    <div class="form-group">
      <label>كلمة المرور الجديدة</label>
      <input type="password" id="cp-new" class="form-control" placeholder="8 أحرف على الأقل">
    </div>
    <div class="form-group">
      <label>تأكيد كلمة المرور الجديدة</label>
      <input type="password" id="cp-confirm" class="form-control" placeholder="أعد إدخال كلمة المرور الجديدة">
    </div>
    <div id="cp-error"   style="color:#c53030;font-size:13px;margin-bottom:12px;display:none;"></div>
    <div id="cp-success" style="color:#2f855a;font-size:13px;margin-bottom:12px;display:none;"></div>
    <button class="btn btn-primary" onclick="changePassword()">حفظ كلمة المرور الجديدة</button>
  </div>
</div>

<script>
(function initProfile() {
  const user = JSON.parse(localStorage.getItem('hr_user') || '{}');
  const ROLE_LABELS = { admin: 'مدير النظام', manager: 'مشرف', staff: 'موظف' };
  document.getElementById('profile-info').innerHTML = `
    <div style="display:flex;justify-content:space-between;border-bottom:1px solid #f0f0f0;padding-bottom:10px;">
      <span style="color:#6c757d;font-size:13px;">اسم المستخدم</span>
      <strong>${user.username || '—'}</strong>
    </div>
    <div style="display:flex;justify-content:space-between;border-bottom:1px solid #f0f0f0;padding-bottom:10px;">
      <span style="color:#6c757d;font-size:13px;">الاسم الكامل</span>
      <strong>${user.full_name || '—'}</strong>
    </div>
    <div style="display:flex;justify-content:space-between;">
      <span style="color:#6c757d;font-size:13px;">الدور</span>
      <strong>${ROLE_LABELS[user.role] || user.role || '—'}</strong>
    </div>`;
})();

async function changePassword() {
  const current = document.getElementById('cp-current').value;
  const newPass  = document.getElementById('cp-new').value;
  const confirm  = document.getElementById('cp-confirm').value;
  const errEl    = document.getElementById('cp-error');
  const okEl     = document.getElementById('cp-success');
  errEl.style.display = 'none';
  okEl.style.display  = 'none';

  if (!current || !newPass || !confirm) { errEl.textContent = 'يرجى ملء جميع الحقول'; errEl.style.display = 'block'; return; }
  if (newPass.length < 8) { errEl.textContent = 'كلمة المرور الجديدة يجب أن تكون 8 أحرف على الأقل'; errEl.style.display = 'block'; return; }
  if (newPass !== confirm) { errEl.textContent = 'كلمة المرور الجديدة غير متطابقة'; errEl.style.display = 'block'; return; }

  try {
    const res = await fetch('/api/users/change-password/me', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + localStorage.getItem('hr_token') },
      body: JSON.stringify({ current_password: current, new_password: newPass })
    });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.error || 'خطأ'; errEl.style.display = 'block'; return; }
    document.getElementById('cp-current').value = '';
    document.getElementById('cp-new').value = '';
    document.getElementById('cp-confirm').value = '';
    okEl.textContent = '✅ تم تغيير كلمة المرور بنجاح';
    okEl.style.display = 'block';
    showToast('تم تغيير كلمة المرور بنجاح', 'success');
  } catch { errEl.textContent = 'تعذر الاتصال بالخادم'; errEl.style.display = 'block'; }
}
</script>
