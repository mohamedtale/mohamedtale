<script>
/* ============================================================
   JavaScript.html — HR System Frontend Logic
   ============================================================ */

var currentEmployee = null;
var currentStats    = null;

document.addEventListener('DOMContentLoaded', function () {
  renderCurrentDate();
  setupEnterKey();
});

function renderCurrentDate() {
  var el = document.getElementById('current-date-display');
  if (!el) return;
  el.textContent = new Date().toLocaleDateString('ar-SA', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });
}

function setupEnterKey() {
  var el = document.getElementById('emp-id-input');
  if (el) el.addEventListener('keydown', function(e) { if (e.key === 'Enter') triggerSearch(); });
}

// ── البحث ──
function triggerSearch() {
  var empId  = document.getElementById('emp-id-input').value.trim();
  var period = document.getElementById('period-select').value;

  clearAlerts();

  if (!empId) {
    showAlert('يرجى إدخال الرقم الوظيفي قبل البحث.', 'danger');
    document.getElementById('emp-id-input').focus();
    return;
  }

  // التحقق المبدئي على جانب العميل
  if (empId.length > 30 || !/^[a-zA-Z0-9؀-ۿ\-_]+$/.test(empId)) {
    showAlert('الرقم الوظيفي يحتوي على أحرف غير مسموح بها.', 'danger');
    return;
  }

  showLoader(true);
  hideResults();

  google.script.run
    .withSuccessHandler(handleSearchSuccess)
    .withFailureHandler(handleSearchError)
    .searchEmployee(empId, period);
}

function handleSearchSuccess(result) {
  showLoader(false);

  if (result === null || result === undefined) {
    showAlert('لم يصل رد من الخادم. تأكد من نشر المشروع كـ Web App وأن الصلاحيات محدّثة، ثم حاول مرة أخرى.', 'danger');
    return;
  }

  if (typeof result !== 'object') {
    showAlert('استجابة غير متوقعة من الخادم: ' + typeof result, 'danger');
    return;
  }

  if (!result.success) {
    showAlert(result.message || 'حدث خطأ غير معروف.', 'danger');
    return;
  }

  currentEmployee = result.employee;
  currentStats    = result.stats;

  renderEmployeeCard(result.employee);
  renderStats(result.stats);
  renderAttendanceTable(result.attendance || [], result.stats);
  showResults();
}

function handleSearchError(error) {
  showLoader(false);
  var msg = error && error.message ? error.message : 'خطأ غير معروف';
  showAlert('خطأ من الخادم: ' + msg, 'danger');
}

// ── رسم بيانات الموظف ──
function renderEmployeeCard(emp) {
  setText('emp-name',            emp.name);
  setText('emp-title',           emp.jobTitle);
  setText('emp-title-detail',    emp.jobTitle);
  setText('emp-id-display',      'رقم وظيفي: ' + emp.empId);
  setText('emp-dept',            emp.departmentOffice);
  setText('emp-section',         emp.section);
  setText('emp-grade',           emp.grade);
  setText('emp-qualification',   emp.qualification);
  setText('emp-manager',         emp.manager);
  setText('emp-location',        emp.location);
  setText('emp-status',          emp.status);
  setText('emp-checkin',         emp.checkInTime);
  setText('emp-checkout',        emp.checkOutTime);
  setText('emp-emergency-leave', emp.emergencyLeaveBalance + ' يوم');
}

// ── رسم الإحصاءات ──
function renderStats(stats) {
  setText('period-label',       stats.periodLabel);
  setText('stat-assignments',   stats.assignmentsCount);
  setText('stat-exit-permits',  stats.exitPermitsCount);
  setText('stat-leaves-count',  stats.leavesCount);
  setText('stat-total-days',    stats.totalLeaveDays);
  setText('stat-unpaid-days',   stats.unpaidLeaveDays);
  setText('stat-sick-days',     stats.sickLeaveDays);
}

// ── رسم جدول الحضور ──
function renderAttendanceTable(rows, stats) {
  var tbody = document.getElementById('att-table-body');
  if (!tbody) return;

  setText('att-total-days',   rows.length);
  setText('att-late-count',   stats.lateCount      || 0);
  setText('att-late-total',   formatLateDisplay(stats.totalLateMinutes || 0));
  setText('att-early-exit',   stats.earlyExitCount || 0);
  setText('att-period-badge', stats.periodLabel    || '');

  if (!rows || rows.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#999;padding:24px;">لا توجد سجلات حضور في هذه الفترة</td></tr>';
    return;
  }

  var html = '';
  for (var i = 0; i < rows.length; i++) {
    var r        = rows[i];
    var rowClass = '';

    if      (r.status === 'both')  rowClass = 'row-both';
    else if (r.status === 'late')  rowClass = 'row-late';
    else if (r.status === 'early') rowClass = 'row-early';

    var badgeHtml;
    if      (r.status === 'both')  badgeHtml = '<span class="badge-both">متأخر + خروج مبكر</span>';
    else if (r.status === 'late')  badgeHtml = '<span class="badge-late">متأخر</span>';
    else if (r.status === 'early') badgeHtml = '<span class="badge-early-exit">خروج بغير إذن</span>';
    else                           badgeHtml = '<span class="badge-ok">في الوقت</span>';

    var lateHtml = r.isLate
      ? '<span class="late-minutes">' + escapeHtml(r.lateText) + '</span>'
      : '<span style="color:#aaa;">—</span>';

    var checkOutHtml = r.isEarlyExit
      ? '<span style="color:#6a3d9a;font-weight:700;">' + escapeHtml(r.checkOut) + ' ⚠️</span>'
      : escapeHtml(r.checkOut);

    html +=
      '<tr class="' + rowClass + '">' +
        '<td>' + escapeHtml(r.dayName) + '</td>' +
        '<td>' + escapeHtml(r.date)    + '</td>' +
        '<td>' + escapeHtml(r.checkIn) + '</td>' +
        '<td>' + checkOutHtml          + '</td>' +
        '<td>' + lateHtml              + '</td>' +
        '<td>' + badgeHtml             + '</td>' +
      '</tr>';
  }
  tbody.innerHTML = html;
}

function formatLateDisplay(totalMinutes) {
  if (!totalMinutes || totalMinutes === 0) return '—';
  if (totalMinutes < 60) return totalMinutes + ' دقيقة';
  var h = Math.floor(totalMinutes / 60);
  var m = totalMinutes % 60;
  return h + ' ساعة' + (m > 0 ? ' و' + m + ' دقيقة' : '');
}

function onPeriodChange() {
  if (!currentEmployee) return;
  triggerSearch();
}

// ── تصدير PDF ──
function exportPDF() {
  if (!currentEmployee) {
    showAlert('يرجى البحث عن موظف أولاً.', 'danger');
    return;
  }

  var btn = document.getElementById('btn-export-pdf');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span>⏳</span><span>جارٍ التصدير…</span>'; }

  if (!window.jspdf || !window.jspdf.jsPDF) {
    showAlert('مكتبة PDF غير محملة. يرجى تحديث الصفحة.', 'danger');
    resetPdfBtn(btn);
    return;
  }

  var jsPDF   = window.jspdf.jsPDF;
  var pdf     = new jsPDF({ orientation: 'p', unit: 'mm', format: 'a4' });
  var pageW   = 210;
  var pageH   = 297;
  var margin  = 14;
  var contentW = pageW - margin * 2;

  var section = document.getElementById('results-section');
  if (!section) { resetPdfBtn(btn); return; }

  var btnRow = section.querySelector('.btn-row');
  if (btnRow) btnRow.style.display = 'none';

  html2canvas(section, {
    scale          : 2,
    useCORS        : true,
    allowTaint     : true,
    backgroundColor: '#f0f4f8',
    logging        : false
  }).then(function(canvas) {
    if (btnRow) btnRow.style.display = '';

    var imgData = canvas.toDataURL('image/jpeg', 0.92);
    var imgW    = contentW;
    var imgH    = (canvas.height * imgW) / canvas.width;
    var maxH    = pageH - margin * 2 - 30; // هامش للتذييل
    var y       = margin;

    // رأس الصفحة
    pdf.setFillColor(26, 58, 92);
    pdf.rect(0, 0, pageW, 22, 'F');
    pdf.setTextColor(255, 255, 255);
    pdf.setFontSize(11);
    pdf.setFont('helvetica', 'bold');
    pdf.text('State of Libya - Ministry of Water Resources', margin, 8);
    pdf.setFontSize(9);
    pdf.setFont('helvetica', 'normal');
    pdf.text('Executive Device for Drilling & Maintenance of Water Wells  |  HR Dept.', margin, 14);
    var dateStr = 'Issued: ' + new Date().toLocaleDateString('en-GB');
    pdf.text(dateStr, pageW - margin - pdf.getTextWidth(dateStr), 15);
    y = 26;

    if (imgH <= maxH) {
      pdf.addImage(imgData, 'JPEG', margin, y, imgW, imgH);
    } else {
      var sourceY    = 0;
      var sliceRatio = canvas.width / imgW;
      while (sourceY < canvas.height) {
        var sliceH = Math.min(maxH * sliceRatio, canvas.height - sourceY);
        var sc     = document.createElement('canvas');
        sc.width   = canvas.width;
        sc.height  = sliceH;
        sc.getContext('2d').drawImage(canvas, 0, sourceY, canvas.width, sliceH, 0, 0, canvas.width, sliceH);
        pdf.addImage(sc.toDataURL('image/jpeg', 0.92), 'JPEG', margin, y, imgW, sliceH / sliceRatio);
        sourceY += sliceH;
        if (sourceY < canvas.height) {
          pdf.addPage();
          pdf.setFillColor(26, 58, 92);
          pdf.rect(0, 0, pageW, 10, 'F');
          pdf.setTextColor(255, 255, 255);
          pdf.setFontSize(8);
          pdf.text('HR System - ' + currentEmployee.name + ' (' + currentEmployee.empId + ')', margin, 7);
          y = 14;
        }
      }
    }

    // تذييل آخر صفحة
    var fy = pageH - 22;
    pdf.setFillColor(240, 244, 248);
    pdf.rect(0, fy - 2, pageW, 24, 'F');
    pdf.setDrawColor(26, 58, 92);
    pdf.setLineWidth(0.5);
    pdf.line(margin, fy - 2, pageW - margin, fy - 2);
    pdf.setTextColor(26, 58, 92);
    pdf.setFontSize(8);
    pdf.setFont('helvetica', 'bold');
    pdf.text('HR Manager Signature: ____________________', margin, fy + 5);
    pdf.text('Department Head: ____________________', pageW / 2 - 10, fy + 5);
    pdf.setFont('helvetica', 'normal');
    pdf.setTextColor(120, 120, 120);
    pdf.setFontSize(7);
    pdf.text('Generated by HR Management System  |  ' + new Date().toLocaleString('en-GB'), margin, fy + 12);

    // اسم الملف — تنقية الأحرف الخطيرة
    var safeName = currentEmployee.name.replace(/[^a-zA-Z0-9؀-ۿ\s]/g, '').replace(/\s+/g, '_').substring(0, 40);
    var fileName = 'HR_' + currentEmployee.empId + '_' + safeName + '_' + _formatFileDate() + '.pdf';
    pdf.save(fileName);
    resetPdfBtn(btn);

  }).catch(function(err) {
    if (btnRow) btnRow.style.display = '';
    resetPdfBtn(btn);
    showAlert('حدث خطأ أثناء إنشاء PDF. يرجى المحاولة مرة أخرى.', 'danger');
  });
}

function resetPdfBtn(btn) {
  if (btn) { btn.disabled = false; btn.innerHTML = '<span>📄</span><span>تصدير PDF</span>'; }
}

function _formatFileDate() {
  var d = new Date();
  return d.getFullYear() + ('0'+(d.getMonth()+1)).slice(-2) + ('0'+d.getDate()).slice(-2);
}

// ── طباعة التقرير الرسمي ──
function printReport() {
  if (!currentEmployee) {
    showAlert('يرجى البحث عن موظف أولاً.', 'danger');
    return;
  }

  var now    = new Date();
  var docNum = currentEmployee.empId + '/' + now.getFullYear() + '/' + _generateDocSerial();

  setText('print-emp-name',    currentEmployee.name);
  setText('print-emp-id',      currentEmployee.empId);
  setText('print-period',      currentStats ? currentStats.periodLabel : '');
  setText('print-date',        _formatPrintDate(now));
  setText('print-doc-number',  docNum);
  setText('print-footer-date', 'تاريخ الطباعة: ' + _formatPrintDate(now));

  window.print();
}

function _generateDocSerial() {
  var now = new Date();
  return String(now.getMonth() + 1).padStart(2, '0') +
         String(now.getDate()).padStart(2, '0') +
         String(now.getHours()).padStart(2, '0') +
         String(now.getMinutes()).padStart(2, '0');
}

// ── مسح النتائج ──
function clearResults() {
  currentEmployee = null;
  currentStats    = null;
  document.getElementById('emp-id-input').value = '';
  clearAlerts();
  hideResults();
  document.getElementById('emp-id-input').focus();
}

// ── إظهار/إخفاء ──
function showResults() {
  var el = document.getElementById('results-section');
  if (el) el.classList.remove('hidden');
}

function hideResults() {
  var el = document.getElementById('results-section');
  if (el) el.classList.add('hidden');
}

function showLoader(show) {
  var el = document.getElementById('loader-overlay');
  if (!el) return;
  if (show) el.classList.remove('hidden');
  else      el.classList.add('hidden');
}

// ── تنبيهات ──
var ALERT_TYPES = { danger: true, success: true, info: true };

function showAlert(message, type) {
  var container = document.getElementById('alert-container');
  if (!container) return;
  var safeType = ALERT_TYPES[type] ? type : 'info';
  var icon = safeType === 'danger' ? '⚠️' : safeType === 'success' ? '✅' : 'ℹ️';
  var div = document.createElement('div');
  div.className = 'alert alert-' + safeType;
  var iconSpan = document.createElement('span');
  iconSpan.textContent = icon;
  var msgSpan = document.createElement('span');
  msgSpan.textContent = message;  // textContent — آمن من XSS
  div.appendChild(iconSpan);
  div.appendChild(msgSpan);
  container.innerHTML = '';
  container.appendChild(div);
}

function clearAlerts() {
  var el = document.getElementById('alert-container');
  if (el) el.innerHTML = '';
}

// ── مساعدات ──
function setText(id, value) {
  var el = document.getElementById(id);
  if (el) el.textContent = (value !== undefined && value !== null) ? value : '—';
}

// escapeHtml كامل — يشمل single quote
function escapeHtml(str) {
  return String(str)
    .replace(/&/g,  '&amp;')
    .replace(/</g,  '&lt;')
    .replace(/>/g,  '&gt;')
    .replace(/"/g,  '&quot;')
    .replace(/'/g,  '&#039;');
}

function _formatPrintDate(date) {
  return date.toLocaleDateString('ar-SA', { year: 'numeric', month: 'long', day: 'numeric' });
}
</script>
