<script>
/* ============================================================
   JavaScript.html — HR System Frontend Logic
   ============================================================ */

// ── الحالة العامة ──
var currentEmployee = null;
var currentStats    = null;

// ── عند تحميل الصفحة ──
document.addEventListener('DOMContentLoaded', function () {
  renderCurrentDate();
  setupEnterKey();
});

// ── عرض التاريخ الحالي في الرأس ──
function renderCurrentDate() {
  var el = document.getElementById('current-date-display');
  if (!el) return;
  var now  = new Date();
  var opts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
  el.textContent = now.toLocaleDateString('ar-SA', opts);
}

// ── تفعيل البحث بضغط Enter ──
function setupEnterKey() {
  var empInput = document.getElementById('emp-id-input');
  if (empInput) {
    empInput.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') triggerSearch();
    });
  }
}

// ── تشغيل البحث ──
function triggerSearch() {
  var empId  = document.getElementById('emp-id-input').value.trim();
  var period = document.getElementById('period-select').value;

  clearAlerts();

  if (!empId) {
    showAlert('يرجى إدخال الرقم الوظيفي قبل البحث.', 'danger');
    document.getElementById('emp-id-input').focus();
    return;
  }

  showLoader(true);
  hideResults();

  google.script.run
    .withSuccessHandler(handleSearchSuccess)
    .withFailureHandler(handleSearchError)
    .searchEmployee(empId, period);
}

// ── معالجة نجاح البحث ──
function handleSearchSuccess(result) {
  showLoader(false);

  if (!result.success) {
    showAlert(result.message, 'danger');
    return;
  }

  currentEmployee = result.employee;
  currentStats    = result.stats;

  renderEmployeeCard(result.employee);
  renderStats(result.stats);
  renderAttendanceTable(result.attendance || [], result.stats);
  showResults();
}

// ── معالجة خطأ البحث ──
function handleSearchError(error) {
  showLoader(false);
  showAlert('حدث خطأ أثناء الاتصال بالخادم: ' + (error.message || error), 'danger');
}

// ── رسم بيانات الموظف ──
function renderEmployeeCard(emp) {
  setText('emp-name',          emp.name);
  setText('emp-title',         emp.jobTitle);
  setText('emp-title-detail',  emp.jobTitle);
  setText('emp-id-display',    'رقم وظيفي: ' + emp.empId);
  setText('emp-dept',          emp.departmentOffice);
  setText('emp-section',       emp.section);
  setText('emp-grade',         emp.grade);
  setText('emp-qualification', emp.qualification);
  setText('emp-manager',       emp.manager);
  setText('emp-location',      emp.location);
  setText('emp-status',        emp.status);
  setText('emp-checkin',       emp.checkInTime);
  setText('emp-checkout',      emp.checkOutTime);
  setText('emp-emergency-leave', emp.emergencyLeaveBalance + ' يوم');
}

// ── رسم الإحصاءات ──
function renderStats(stats) {
  setText('period-label', stats.periodLabel);
  setText('stat-assignments',  stats.assignmentsCount);
  setText('stat-exit-permits', stats.exitPermitsCount);
  setText('stat-leaves-count', stats.leavesCount);
  setText('stat-total-days',   stats.totalLeaveDays);
  setText('stat-unpaid-days',  stats.unpaidLeaveDays);
  setText('stat-sick-days',    stats.sickLeaveDays);
}

// ── رسم جدول الحضور والانصراف والتأخير ──
function renderAttendanceTable(rows, stats) {
  var tbody = document.getElementById('att-table-body');
  if (!tbody) return;

  // تحديث الملخص السريع
  setText('att-total-days',  rows.length);
  setText('att-late-count',  stats.lateCount      || 0);
  setText('att-late-total',  formatLateDisplay(stats.totalLateMinutes || 0));
  setText('att-early-exit',  stats.earlyExitCount || 0);
  setText('att-period-badge', stats.periodLabel   || '');

  if (!rows || rows.length === 0) {
    tbody.innerHTML =
      '<tr><td colspan="6" style="text-align:center;color:var(--text-muted);padding:24px;">لا توجد سجلات حضور في هذه الفترة</td></tr>';
    return;
  }

  var html = '';
  for (var i = 0; i < rows.length; i++) {
    var r         = rows[i];
    var isWeekend = (r.dayName === 'الجمعة' || r.dayName === 'السبت');
    var rowClass  = isWeekend ? 'weekend-row' : '';

    // تلوين صف حسب الحالة
    if      (r.status === 'both')  rowClass += ' row-both';
    else if (r.status === 'late')  rowClass += ' row-late';
    else if (r.status === 'early') rowClass += ' row-early';

    // badge الحالة
    var badgeHtml;
    switch (r.status) {
      case 'both':
        badgeHtml = '<span class="badge-both">متأخر + خروج مبكر</span>';
        break;
      case 'late':
        badgeHtml = '<span class="badge-late">متأخر</span>';
        break;
      case 'early':
        badgeHtml = '<span class="badge-early-exit">خروج بغير إذن</span>';
        break;
      default:
        badgeHtml = '<span class="badge-ok">في الوقت</span>';
    }

    // عمود التأخير
    var lateHtml = r.isLate
      ? '<span class="late-minutes">' + escapeHtml(r.lateText) + '</span>'
      : '<span style="color:var(--text-muted);">—</span>';

    // تمييز وقت الانصراف إذا كان مبكراً
    var checkOutHtml = r.isEarlyExit
      ? '<span style="color:#6a3d9a;font-weight:700;">' + escapeHtml(r.checkOut) + ' ⚠️</span>'
      : escapeHtml(r.checkOut);

    html +=
      '<tr class="' + rowClass + '">' +
        '<td>' + escapeHtml(r.dayName) + '</td>' +
        '<td>' + escapeHtml(r.date)    + '</td>' +
        '<td>' + escapeHtml(r.checkIn) + '</td>' +
        '<td>' + checkOutHtml          + '</td>' +
        '<td>' + lateHtml              + '</td>' +
        '<td>' + badgeHtml             + '</td>' +
      '</tr>';
  }
  tbody.innerHTML = html;
}

// ── تنسيق وقت التأخير الإجمالي ──
function formatLateDisplay(totalMinutes) {
  if (!totalMinutes || totalMinutes === 0) return '—';
  if (totalMinutes < 60) return totalMinutes + ' دقيقة';
  var h = Math.floor(totalMinutes / 60);
  var m = totalMinutes % 60;
  return h + ' ساعة' + (m > 0 ? ' و' + m + ' دقيقة' : '');
}

// ── تغيير الفترة الزمنية وإعادة الحساب ──
function onPeriodChange() {
  if (!currentEmployee) return;
  triggerSearch();
}

// ── تصدير PDF ──
function exportPDF() {
  if (!currentEmployee) {
    showAlert('يرجى البحث عن موظف أولاً قبل التصدير.', 'danger');
    return;
  }

  var btn = document.getElementById('btn-export-pdf');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span>⏳</span><span>جارٍ التصدير…</span>'; }

  var { jsPDF } = window.jspdf;

  // إعداد PDF بحجم A4
  var pdf      = new jsPDF({ orientation: 'p', unit: 'mm', format: 'a4' });
  var pageW    = 210;
  var pageH    = 297;
  var margin   = 14;
  var contentW = pageW - margin * 2;
  var y        = margin;

  // ── خط Cairo (latin fallback — الأرقام والنصوص الإنجليزية) ──
  // نستخدم html2canvas لالتقاط القسم المرئي بدقة عالية

  var section = document.getElementById('results-section');
  if (!section) { resetPdfBtn(btn); return; }

  // إخفاء الأزرار مؤقتاً أثناء الالتقاط
  var btnRow = section.querySelector('.btn-row');
  if (btnRow) btnRow.style.display = 'none';

  html2canvas(section, {
    scale          : 2,
    useCORS        : true,
    allowTaint     : true,
    backgroundColor: '#f0f4f8',
    logging        : false
  }).then(function(canvas) {

    // إعادة الأزرار
    if (btnRow) btnRow.style.display = '';

    var imgData  = canvas.toDataURL('image/jpeg', 0.92);
    var imgW     = contentW;
    var imgH     = (canvas.height * imgW) / canvas.width;
    var maxH     = pageH - margin * 2;

    // ── رأس الصفحة الرسمي ──
    pdf.setFillColor(26, 58, 92);
    pdf.rect(0, 0, pageW, 22, 'F');

    pdf.setTextColor(255, 255, 255);
    pdf.setFontSize(11);
    pdf.setFont('helvetica', 'bold');
    pdf.text('State of Libya - Ministry of Water Resources', margin, 8);
    pdf.setFontSize(9);
    pdf.setFont('helvetica', 'normal');
    pdf.text('Executive Device for Drilling & Maintenance of Water Wells  |  HR Dept.', margin, 14);

    // تاريخ الإصدار يميناً
    var dateStr = 'Issued: ' + new Date().toLocaleDateString('en-SA');
    pdf.text(dateStr, pageW - margin - pdf.getTextWidth(dateStr), 15);

    y = 26;

    // ── لصق محتوى الصورة (مقسّم على صفحات إذا طال) ──
    if (imgH <= maxH) {
      pdf.addImage(imgData, 'JPEG', margin, y, imgW, imgH);
      y += imgH + 6;
    } else {
      // تقسيم الصورة على صفحات
      var sourceY    = 0;
      var sliceRatio = canvas.width / imgW;

      while (sourceY < canvas.height) {
        var sliceH       = Math.min(maxH * sliceRatio, canvas.height - sourceY);
        var sliceCanvas  = document.createElement('canvas');
        sliceCanvas.width  = canvas.width;
        sliceCanvas.height = sliceH;
        sliceCanvas.getContext('2d').drawImage(canvas, 0, sourceY, canvas.width, sliceH, 0, 0, canvas.width, sliceH);
        var sliceData    = sliceCanvas.toDataURL('image/jpeg', 0.92);
        var sliceImgH    = sliceH / sliceRatio;

        pdf.addImage(sliceData, 'JPEG', margin, y, imgW, sliceImgH);
        sourceY += sliceH;

        if (sourceY < canvas.height) {
          pdf.addPage();
          // رأس الصفحات التالية
          pdf.setFillColor(26, 58, 92);
          pdf.rect(0, 0, pageW, 10, 'F');
          pdf.setTextColor(255, 255, 255);
          pdf.setFontSize(8);
          pdf.text('HR System - ' + currentEmployee.name + ' (' + currentEmployee.empId + ')', margin, 7);
          y = 14;
        }
      }
    }

    // ── تذييل رسمي في آخر صفحة ──
    var footerY = pageH - 20;
    pdf.setFillColor(240, 244, 248);
    pdf.rect(0, footerY - 2, pageW, 22, 'F');

    pdf.setDrawColor(26, 58, 92);
    pdf.setLineWidth(0.5);
    pdf.line(margin, footerY - 2, pageW - margin, footerY - 2);

    pdf.setTextColor(26, 58, 92);
    pdf.setFontSize(8);
    pdf.setFont('helvetica', 'bold');
    pdf.text('HR Manager Signature: ____________________', margin, footerY + 4);
    pdf.text('Department Head: ____________________', pageW / 2 - 10, footerY + 4);

    pdf.setFont('helvetica', 'normal');
    pdf.setTextColor(120, 120, 120);
    pdf.setFontSize(7);
    pdf.text('Generated by HR Management System  |  ' + new Date().toLocaleString('en-SA'), margin, footerY + 11);

    // ── حفظ الملف ──
    var fileName = 'HR_' + currentEmployee.empId + '_' + currentEmployee.name.replace(/\s+/g, '_') + '_' + formatFileDate() + '.pdf';
    pdf.save(fileName);

    resetPdfBtn(btn);

  }).catch(function(err) {
    if (btnRow) btnRow.style.display = '';
    resetPdfBtn(btn);
    showAlert('حدث خطأ أثناء إنشاء PDF: ' + err.message, 'danger');
  });
}

function resetPdfBtn(btn) {
  if (btn) { btn.disabled = false; btn.innerHTML = '<span>📄</span><span>تصدير PDF</span>'; }
}

function formatFileDate() {
  var d = new Date();
  return d.getFullYear() + ('0'+(d.getMonth()+1)).slice(-2) + ('0'+d.getDate()).slice(-2);
}

// ── طباعة التقرير الحكومي الرسمي ──
function printReport() {
  if (!currentEmployee) {
    showAlert('يرجى البحث عن موظف أولاً قبل الطباعة.', 'danger');
    return;
  }

  var now     = new Date();
  var docNum  = currentEmployee.empId + '/' + (now.getFullYear()) + '/' + generateDocSerial();

  setText('print-emp-name',    currentEmployee.name);
  setText('print-emp-id',      currentEmployee.empId);
  setText('print-period',      currentStats ? currentStats.periodLabel : '');
  setText('print-date',        formatPrintDate(now));
  setText('print-doc-number',  docNum);
  setText('print-footer-date', 'تاريخ الطباعة: ' + formatPrintDate(now));

  // تحديث اسم الجهة في رأس الطباعة (يمكن تعديله)
  var orgEl = document.getElementById('print-org-name');
  if (orgEl && orgEl.textContent.indexOf('جهاز') !== -1) {
    // الاسم محدد مسبقاً في HTML
  }

  window.print();
}

// ── توليد رقم مسلسل للوثيقة ──
function generateDocSerial() {
  var now = new Date();
  return String(now.getMonth() + 1).padStart(2,'0') +
         String(now.getDate()).padStart(2,'0') +
         String(now.getHours()).padStart(2,'0') +
         String(now.getMinutes()).padStart(2,'0');
}

// ── مسح النتائج ──
function clearResults() {
  currentEmployee = null;
  currentStats    = null;
  document.getElementById('emp-id-input').value = '';
  clearAlerts();
  hideResults();
  document.getElementById('emp-id-input').focus();
}

// ── إظهار/إخفاء النتائج ──
function showResults() {
  var resultsSection = document.getElementById('results-section');
  if (resultsSection) resultsSection.classList.remove('hidden');
}

function hideResults() {
  var resultsSection = document.getElementById('results-section');
  if (resultsSection) resultsSection.classList.add('hidden');
}

// ── مؤشر التحميل ──
function showLoader(show) {
  var loader = document.getElementById('loader-overlay');
  if (!loader) return;
  if (show) {
    loader.classList.remove('hidden');
  } else {
    loader.classList.add('hidden');
  }
}

// ── تنبيهات ──
function showAlert(message, type) {
  var container = document.getElementById('alert-container');
  if (!container) return;
  var icon = type === 'danger' ? '⚠️' : type === 'success' ? '✅' : 'ℹ️';
  container.innerHTML =
    '<div class="alert alert-' + type + '">' +
      '<span>' + icon + '</span>' +
      '<span>' + escapeHtml(message) + '</span>' +
    '</div>';
}

function clearAlerts() {
  var container = document.getElementById('alert-container');
  if (container) container.innerHTML = '';
}

// ── مساعدات ──
function setText(id, value) {
  var el = document.getElementById(id);
  if (el) el.textContent = (value !== undefined && value !== null) ? value : '—';
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function formatPrintDate(date) {
  var opts = { year: 'numeric', month: 'long', day: 'numeric' };
  return date.toLocaleDateString('ar-SA', opts);
}
</script>
