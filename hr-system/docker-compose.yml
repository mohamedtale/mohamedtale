version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: hr_db
    environment:
      POSTGRES_DB: hr_system
      POSTGRES_USER: hr_user
      POSTGRES_PASSWORD: hr_password
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./backend/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    ports:
      - "5433:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hr_user -d hr_system"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: hr_backend
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: hr_system
      DB_USER: hr_user
      DB_PASSWORD: hr_password
      PORT: 3001
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE: 52428800
      # غيّر هذا المفتاح قبل التشغيل:
      # node -e "console.log(require('crypto').randomBytes(64).toString('hex'))"
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env file}
    volumes:
      - uploads:/app/uploads
      - ./frontend:/app/frontend
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
