version: '3.8'

services:
  # PostgreSQL with PostGIS
  db:
    image: postgis/postgis:16-3.4
    container_name: water_wells_db
    environment:
      POSTGRES_DB: water_wells
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_secure_2024
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/migrations.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    networks:
      - water_wells_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d water_wells"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: water_wells_api
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: water_wells
      DB_USER: postgres
      DB_PASSWORD: postgres_secure_2024
      JWT_SECRET: water_wells_jwt_secret_change_in_production_2024
      FRONTEND_URL: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - water_wells_network
    restart: unless-stopped
    volumes:
      - ./backend/uploads:/app/uploads

  # Frontend Next.js
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:5000/api
    container_name: water_wells_frontend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - water_wells_network
    restart: unless-stopped

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: water_wells_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - water_wells_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  water_wells_network:
    driver: bridge
