<script>
// ══════════════════════════════════════
// حالة التطبيق
// ══════════════════════════════════════
var _currentType   = '';
var _currentIcon   = '';
var _currentField1 = '';
var _currentField2 = '';
var _allRecords    = [];
var _currentFile   = null;
var _pendingFileId  = '';
var _pendingFileUrl = '';

// ══════════════════════════════════════
// تحميل الصفحة الرئيسية
// ══════════════════════════════════════
function loadHome() {
  showLoader('جارٍ الاتصال…');

  // مهلة 12 ثانية — إذا لم يرد الخادم تعني مشكلة صلاحيات
  var _timer = setTimeout(function() {
    hideLoader();
    showBadge('خطأ في الاتصال');
    document.getElementById('types-grid').innerHTML =
      '<div style="grid-column:1/-1;text-align:center;padding:40px 20px;">' +
      '<div style="font-size:36px;margin-bottom:12px;">🔐</div>' +
      '<div style="font-size:15px;font-weight:800;color:#c0392b;margin-bottom:8px;">الخادم لا يستجيب</div>' +
      '<div style="font-size:12px;color:#555;line-height:1.8;">' +
      'يجب منح صلاحيات للسكريبت:<br>' +
      '1. افتح محرر Apps Script<br>' +
      '2. اختر دالة <b>getFileTypes</b> واضغط ▶ Run<br>' +
      '3. اقبل طلب الصلاحيات<br>' +
      '4. أعد النشر: Deploy → New version' +
      '</div></div>';
  }, 12000);

  // اختبار اتصال أولي
  google.script.run
    .withSuccessHandler(function() {
      // الاتصال يعمل، الآن جلب الأنواع
      showLoader('جارٍ تحميل الأنواع…');
      google.script.run
        .withSuccessHandler(function(res) {
          clearTimeout(_timer);
          if (!res.success) {
            hideLoader();
            showBadge('خطأ');
            document.getElementById('types-grid').innerHTML =
              '<div style="grid-column:1/-1;text-align:center;color:#c00;padding:40px;">خطأ: ' + _h(res.message) + '</div>';
            return;
          }
          google.script.run
            .withSuccessHandler(function(statsRes) {
              hideLoader();
              var stats = (statsRes && statsRes.success) ? statsRes.stats : {};
              renderHomeGrid(res.types, stats);
              showBadge('المجموع: ' + _sumStats(stats) + ' وثيقة');
            })
            .withFailureHandler(function() {
              hideLoader();
              renderHomeGrid(res.types, {});
            })
            .getStats();
        })
        .withFailureHandler(function(e) {
          clearTimeout(_timer);
          hideLoader();
          showBadge('خطأ');
          document.getElementById('types-grid').innerHTML =
            '<div style="grid-column:1/-1;text-align:center;color:#c00;padding:40px;">خطأ: ' + _h(e.message) + '</div>';
        })
        .getFileTypes();
    })
    .withFailureHandler(function(e) {
      clearTimeout(_timer);
      hideLoader();
      showBadge('خطأ في الاتصال');
      document.getElementById('types-grid').innerHTML =
        '<div style="grid-column:1/-1;text-align:center;color:#c00;padding:40px;">فشل الاتصال: ' + _h(e.message) + '</div>';
    })
    .ping();
}

function _sumStats(stats) {
  var s = 0;
  for (var k in stats) s += (parseInt(stats[k]) || 0);
  return s;
}

var CARD_COLORS = [
  '#1a6fc4','#2e7d32','#ad1457','#6a1b9a',
  '#0277bd','#558b2f','#d84315','#00695c',
  '#4527a0','#1565c0','#283593','#37474f',
  '#4e342e','#827717','#880e4f'
];

function renderHomeGrid(types, stats) {
  var grid = document.getElementById('types-grid');
  if (!types || types.length === 0) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#999;padding:40px;">لا توجد أنواع ملفات مُفعَّلة.</div>';
    return;
  }
  var html = '';
  for (var i = 0; i < types.length; i++) {
    var t     = types[i];
    var count = stats[t.name] || 0;
    var color = CARD_COLORS[i % CARD_COLORS.length];
    html += '<div class="type-card" style="--card-color:' + color + ';" ' +
            'onclick="openType(' + _esc(t.name) + ',' + _esc(t.icon) + ',' + _esc(t.field1) + ',' + _esc(t.field2) + ')">' +
            '<div class="type-icon">' + t.icon + '</div>' +
            '<div class="type-name">' + _h(t.name) + '</div>' +
            '<div class="type-count">' + count + ' وثيقة</div>' +
            '</div>';
  }
  grid.innerHTML = html;
}

function _esc(s) { return "'" + (s || '').replace(/'/g, "\\'") + "'"; }
function _h(s)   { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ══════════════════════════════════════
// فتح شاشة النوع
// ══════════════════════════════════════
function openType(name, icon, field1, field2) {
  _currentType   = name;
  _currentIcon   = icon   || '📄';
  _currentField1 = field1 || '';
  _currentField2 = field2 || '';

  // تحديث رأس شاشة النوع
  document.getElementById('type-icon').textContent  = _currentIcon;
  document.getElementById('type-title').textContent = _currentType;
  document.getElementById('type-count').textContent = '…';
  document.getElementById('th-field1').textContent  = _currentField1 || '—';
  document.getElementById('th-field2').textContent  = _currentField2 || '—';
  document.getElementById('field1-group').style.display = _currentField1 ? '' : 'none';
  document.getElementById('field2-group').style.display = _currentField2 ? '' : 'none';
  document.getElementById('field1-label').textContent   = _currentField1;
  document.getElementById('field2-label').textContent   = _currentField2;
  document.getElementById('type-alert').innerHTML = '';
  document.getElementById('search-input').value   = '';

  showScreen('screen-type');
  loadRecords();
}

function goHome() {
  showScreen('screen-home');
  loadHome();
}

function showScreen(id) {
  document.getElementById('screen-home').style.display = id === 'screen-home' ? '' : 'none';
  document.getElementById('screen-type').style.display = id === 'screen-type' ? '' : 'none';
  document.getElementById('header-title').textContent  = id === 'screen-home' ? 'نظام أرشفة القسم' : _currentType;
  document.getElementById('btn-back').style.display    = id === 'screen-home' ? 'none' : 'flex';
}

// ══════════════════════════════════════
// تحميل السجلات
// ══════════════════════════════════════
function loadRecords() {
  showLoader('جارٍ تحميل السجلات…');
  google.script.run
    .withSuccessHandler(function(res) {
      hideLoader();
      if (!res.success) { showTypeAlert(res.message, 'danger'); return; }
      _allRecords = res.records || [];
      renderTable(_allRecords);
      document.getElementById('type-count').textContent = _allRecords.length + ' سجل';
      showBadge(_currentType + ' — ' + _allRecords.length + ' وثيقة');
    })
    .withFailureHandler(function(e) {
      hideLoader();
      showTypeAlert('خطأ في جلب السجلات: ' + e.message, 'danger');
    })
    .getRecords(_currentType);
}

// ══════════════════════════════════════
// عرض الجدول
// ══════════════════════════════════════
function renderTable(records) {
  var tbody = document.getElementById('records-tbody');
  if (!records || records.length === 0) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="10">لا توجد سجلات.</td></tr>';
    return;
  }
  var html = '';
  for (var i = 0; i < records.length; i++) {
    var r = records[i];
    var pdfCell = r.pdfUrl
      ? '<a href="' + _h(r.pdfUrl) + '" target="_blank" class="pdf-link">📄 عرض</a>'
      : '—';
    html += '<tr>' +
      '<td>' + (i + 1) + '</td>' +
      '<td>' + _h(r.refNum)    + '</td>' +
      '<td>' + _h(r.docDate)   + '</td>' +
      '<td class="subject-cell">' + _h(r.subject) + '</td>' +
      '<td>' + _h(r.field1)   + '</td>' +
      '<td>' + _h(r.field2)   + '</td>' +
      '<td>' + _h(r.notes)    + '</td>' +
      '<td>' + pdfCell         + '</td>' +
      '<td>' + _h(r.entryDate) + '</td>' +
      '<td class="actions-cell">' +
        '<button class="btn-action btn-edit"   onclick="openEditModal(' + JSON.stringify(r).replace(/"/g,'&quot;') + ')">✏️</button>' +
        '<button class="btn-action btn-print"  onclick=\'printRecord(' + JSON.stringify(r) + ')\'>🖨️</button>' +
        '<button class="btn-action btn-delete" onclick="confirmDelete(' + _esc(_currentType) + ',' + r.seq + ')">🗑️</button>' +
      '</td>' +
    '</tr>';
  }
  tbody.innerHTML = html;
}

// ══════════════════════════════════════
// بحث مباشر
// ══════════════════════════════════════
function liveSearch(query) {
  query = query.trim().toLowerCase();
  if (!query) { renderTable(_allRecords); return; }
  var filtered = _allRecords.filter(function(r) {
    return (r.subject  || '').toLowerCase().indexOf(query) !== -1 ||
           (r.refNum   || '').toLowerCase().indexOf(query) !== -1 ||
           (r.field1   || '').toLowerCase().indexOf(query) !== -1 ||
           (r.field2   || '').toLowerCase().indexOf(query) !== -1 ||
           (r.notes    || '').toLowerCase().indexOf(query) !== -1 ||
           r.seq.toString() === query;
  });
  renderTable(filtered);
  document.getElementById('type-count').textContent = filtered.length + ' نتيجة';
}

// ══════════════════════════════════════
// مودال الإضافة / التعديل
// ══════════════════════════════════════
function openAddModal() {
  clearModalForm();
  document.getElementById('modal-mode').value  = 'add';
  document.getElementById('modal-seq').value   = '';
  document.getElementById('modal-title').textContent = '➕ إضافة مستند — ' + _currentType;
  document.getElementById('record-modal').style.display = 'flex';
}

function openEditModal(rec) {
  clearModalForm();
  document.getElementById('modal-mode').value  = 'edit';
  document.getElementById('modal-seq').value   = rec.seq;
  document.getElementById('modal-title').textContent = '✏️ تعديل مستند — ' + _currentType;

  document.getElementById('f-refnum').value  = rec.refNum   || '';
  document.getElementById('f-docdate').value = rec.docDate  || '';
  document.getElementById('f-subject').value = rec.subject  || '';
  document.getElementById('f-field1').value  = rec.field1   || '';
  document.getElementById('f-field2').value  = rec.field2   || '';
  document.getElementById('f-notes').value   = rec.notes    || '';
  document.getElementById('f-pdfurl').value  = rec.pdfUrl   || '';
  document.getElementById('f-fileid').value  = rec.fileId   || '';

  if (rec.pdfUrl) {
    document.getElementById('file-preview').style.display = 'flex';
    document.getElementById('file-preview-name').textContent = 'الملف المرفق الحالي';
    document.getElementById('upload-area').style.display = 'none';
  }

  document.getElementById('record-modal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('record-modal').style.display = 'none';
  clearModalForm();
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('record-modal')) closeModal();
}

function clearModalForm() {
  ['f-refnum','f-docdate','f-subject','f-field1','f-field2','f-notes','f-pdfurl','f-fileid'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.value = '';
  });
  document.getElementById('modal-alert').innerHTML = '';
  document.getElementById('file-preview').style.display  = 'none';
  document.getElementById('upload-area').style.display   = '';
  document.getElementById('progress-wrap').style.display = 'none';
  document.getElementById('progress-fill').style.width   = '0%';
  _currentFile   = null;
  _pendingFileId  = '';
  _pendingFileUrl = '';
}

// ══════════════════════════════════════
// حفظ السجل
// ══════════════════════════════════════
function saveRecord() {
  var subject = document.getElementById('f-subject').value.trim();
  if (!subject) { showModalAlert('الموضوع مطلوب.', 'danger'); return; }

  if (_currentFile) {
    uploadFileThenSave();
  } else {
    _doSave();
  }
}

function _doSave() {
  var mode = document.getElementById('modal-mode').value;
  var seq  = document.getElementById('modal-seq').value;

  var data = {
    refNum  : document.getElementById('f-refnum').value.trim(),
    docDate : document.getElementById('f-docdate').value,
    subject : document.getElementById('f-subject').value.trim(),
    field1  : document.getElementById('f-field1').value.trim(),
    field2  : document.getElementById('f-field2').value.trim(),
    notes   : document.getElementById('f-notes').value.trim(),
    pdfUrl  : _pendingFileUrl || document.getElementById('f-pdfurl').value,
    fileId  : _pendingFileId  || document.getElementById('f-fileid').value
  };

  var btn = document.getElementById('modal-save-btn');
  btn.disabled = true;
  showLoader('جارٍ الحفظ…');

  if (mode === 'edit') {
    google.script.run
      .withSuccessHandler(function(res) {
        hideLoader(); btn.disabled = false;
        if (res.success) { closeModal(); loadRecords(); }
        else showModalAlert(res.message, 'danger');
      })
      .withFailureHandler(function(e) {
        hideLoader(); btn.disabled = false;
        showModalAlert('خطأ: ' + e.message, 'danger');
      })
      .updateRecord(_currentType, seq, data);
  } else {
    google.script.run
      .withSuccessHandler(function(res) {
        hideLoader(); btn.disabled = false;
        if (res.success) { closeModal(); loadRecords(); }
        else showModalAlert(res.message, 'danger');
      })
      .withFailureHandler(function(e) {
        hideLoader(); btn.disabled = false;
        showModalAlert('خطأ: ' + e.message, 'danger');
      })
      .addRecord(_currentType, data);
  }
}

// ══════════════════════════════════════
// رفع الملف
// ══════════════════════════════════════
function handleFileSelect(input) {
  var file = input.files[0];
  if (!file) return;

  var allowed = ['application/pdf','image/jpeg','image/png'];
  if (allowed.indexOf(file.type) === -1) {
    showModalAlert('نوع الملف غير مدعوم. PDF أو JPG أو PNG فقط.', 'danger'); return;
  }
  if (file.size > 150 * 1024 * 1024) {
    showModalAlert('حجم الملف يتجاوز 150 ميجابايت.', 'danger'); return;
  }

  _currentFile = file;
  document.getElementById('file-preview-name').textContent = file.name;
  document.getElementById('file-preview').style.display    = 'flex';
  document.getElementById('upload-area').style.display     = 'none';
}

function clearFile() {
  _currentFile = null;
  document.getElementById('file-input').value              = '';
  document.getElementById('file-preview').style.display   = 'none';
  document.getElementById('upload-area').style.display    = '';
  document.getElementById('f-pdfurl').value               = '';
  document.getElementById('f-fileid').value               = '';
  _pendingFileId  = '';
  _pendingFileUrl = '';
}

function uploadFileThenSave() {
  var file = _currentFile;
  showLoader('جارٍ رفع الملف…');
  document.getElementById('progress-wrap').style.display = '';

  var reader = new FileReader();
  reader.onprogress = function(e) {
    if (e.lengthComputable) {
      var pct = Math.round(e.loaded / e.total * 80);
      document.getElementById('progress-fill').style.width = pct + '%';
    }
  };
  reader.onload = function(e) {
    document.getElementById('progress-fill').style.width = '85%';
    var base64 = e.target.result.split(',')[1];
    google.script.run
      .withSuccessHandler(function(res) {
        document.getElementById('progress-fill').style.width = '100%';
        if (res.success) {
          _pendingFileId  = res.fileId;
          _pendingFileUrl = res.fileUrl;
          _currentFile    = null;
          _doSave();
        } else {
          hideLoader();
          showModalAlert('فشل رفع الملف: ' + res.message, 'danger');
        }
      })
      .withFailureHandler(function(err) {
        hideLoader();
        showModalAlert('خطأ في رفع الملف: ' + err.message, 'danger');
      })
      .uploadPDF(base64, file.name, file.type, _currentType);
  };
  reader.onerror = function() {
    hideLoader();
    showModalAlert('تعذّر قراءة الملف.', 'danger');
  };
  reader.readAsDataURL(file);
}

// ══════════════════════════════════════
// الحذف
// ══════════════════════════════════════
function confirmDelete(typeName, seq) {
  if (!confirm('هل تريد حذف هذا السجل نهائياً؟')) return;
  showLoader('جارٍ الحذف…');
  google.script.run
    .withSuccessHandler(function(res) {
      hideLoader();
      if (res.success) loadRecords();
      else showTypeAlert(res.message, 'danger');
    })
    .withFailureHandler(function(e) {
      hideLoader();
      showTypeAlert('خطأ في الحذف: ' + e.message, 'danger');
    })
    .deleteRecord(typeName, seq);
}

// ══════════════════════════════════════
// الطباعة
// ══════════════════════════════════════
function printRecord(rec) {
  var now = new Date();
  var dateStr = now.getFullYear() + '-' +
    String(now.getMonth()+1).padStart(2,'0') + '-' +
    String(now.getDate()).padStart(2,'0');

  document.getElementById('prt-doc-type').textContent    = _currentType;
  document.getElementById('prt-refnum').textContent      = rec.refNum    || '—';
  document.getElementById('prt-print-date').textContent  = dateStr;
  document.getElementById('prt-docdate').textContent     = rec.docDate   || '—';
  document.getElementById('prt-type').textContent        = _currentType;
  document.getElementById('prt-subject').textContent     = rec.subject   || '—';
  document.getElementById('prt-label-f1').textContent    = _currentField1 || '—';
  document.getElementById('prt-field1').textContent      = rec.field1    || '—';
  document.getElementById('prt-label-f2').textContent    = _currentField2 || '—';
  document.getElementById('prt-field2').textContent      = rec.field2    || '—';
  document.getElementById('prt-notes').textContent       = rec.notes     || '—';
  document.getElementById('prt-footer-date').textContent = dateStr;

  window.print();
}

// ══════════════════════════════════════
// تصدير CSV
// ══════════════════════════════════════
function exportCurrentType() {
  if (!_currentType) return;
  showLoader('جارٍ التصدير…');
  google.script.run
    .withSuccessHandler(function(res) {
      hideLoader();
      if (!res.success) { showTypeAlert(res.message, 'danger'); return; }
      _downloadCsv(res.data, res.typeName);
    })
    .withFailureHandler(function(e) {
      hideLoader();
      showTypeAlert('خطأ في التصدير: ' + e.message, 'danger');
    })
    .exportRecords(_currentType);
}

function _downloadCsv(records, typeName) {
  var headers = ['رقم القيد','تاريخ الوثيقة','الموضوع',
    _currentField1, _currentField2, 'ملاحظات','رابط PDF','تاريخ الإدخال'];
  var rows = [headers];
  for (var i = 0; i < records.length; i++) {
    var r = records[i];
    rows.push([r.refNum, r.docDate, r.subject, r.field1, r.field2, r.notes, r.pdfUrl, r.entryDate]);
  }
  var csv = rows.map(function(row) {
    return row.map(function(cell) {
      var s = (cell || '').toString().replace(/"/g, '""');
      return '"' + s + '"';
    }).join(',');
  }).join('\r\n');

  var bom  = '﻿';
  var blob = new Blob([bom + csv], { type: 'text/csv;charset=utf-8;' });
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  a.href   = url;
  a.download = typeName + '_' + new Date().toISOString().slice(0,10) + '.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ══════════════════════════════════════
// مساعدات UI
// ══════════════════════════════════════
function showLoader(text) {
  document.getElementById('loader-text').textContent = text || 'جارٍ التحميل…';
  document.getElementById('loader-overlay').classList.remove('hidden');
}
function hideLoader() {
  document.getElementById('loader-overlay').classList.add('hidden');
}
function showBadge(text) {
  document.getElementById('header-badge').textContent = text;
}
function showTypeAlert(msg, type) {
  var el = document.getElementById('type-alert');
  el.innerHTML = '<div class="alert alert-' + (type||'warning') + '">' + _h(msg) + '</div>';
  setTimeout(function(){ el.innerHTML = ''; }, 5000);
}
function showModalAlert(msg, type) {
  document.getElementById('modal-alert').innerHTML =
    '<div class="alert alert-' + (type||'warning') + '">' + _h(msg) + '</div>';
}

</script>
