<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>المنظومة الذكية | الجهاز التنفيذي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif;-webkit-tap-highlight-color:transparent;}
:root{--gold:#c5a059;--navy:#0a1628;--navy2:#111f38;--navy3:#1a2f4a;}

body{
  background:var(--navy);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  position:relative;
}

/* خلفية متحركة */
.bg-canvas{position:fixed;inset:0;z-index:0;overflow:hidden;}
.orb{position:absolute;border-radius:50%;filter:blur(80px);animation:float 8s ease-in-out infinite;}
.orb1{width:400px;height:400px;background:rgba(197,160,89,.12);top:-10%;right:-5%;animation-delay:0s;}
.orb2{width:350px;height:350px;background:rgba(30,60,120,.2);bottom:-10%;left:-5%;animation-delay:3s;}
.orb3{width:250px;height:250px;background:rgba(197,160,89,.08);top:40%;left:20%;animation-delay:5s;}

/* نجوم */
.stars{position:absolute;inset:0;}
.star{position:absolute;width:2px;height:2px;background:rgba(255,255,255,.5);border-radius:50%;animation:twinkle var(--d) ease-in-out infinite;}
@keyframes twinkle{0%,100%{opacity:.2;transform:scale(1);}50%{opacity:1;transform:scale(1.5);}}
@keyframes float{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(15px,-15px) scale(1.05);}}

/* البطاقة الرئيسية */
.main-card{
  position:relative;z-index:10;
  width:100%;max-width:440px;
  padding:20px;
}

/* رأس الصفحة */
.header{text-align:center;margin-bottom:28px;}
.logo-wrap{
  position:relative;width:100px;height:100px;margin:0 auto 18px;
}
.logo-wrap img{
  width:100%;height:100%;border-radius:50%;object-fit:cover;
  border:2px solid var(--gold);
  box-shadow:0 0 30px rgba(197,160,89,.3);
  position:relative;z-index:2;
}
.logo-ring{
  position:absolute;inset:-10px;border-radius:50%;
  border:2px solid transparent;
  background:linear-gradient(45deg,var(--gold),transparent,var(--gold)) border-box;
  -webkit-mask:linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
  mask:linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite:destination-out;
  mask-composite:exclude;
  animation:spin-ring 4s linear infinite;
}
.logo-ping{
  position:absolute;inset:-6px;border-radius:50%;
  border:1px solid rgba(197,160,89,.3);
  animation:ping 2s ease-out infinite;
}
@keyframes spin-ring{to{transform:rotate(360deg);}}
@keyframes ping{0%{transform:scale(1);opacity:.8;}100%{transform:scale(1.4);opacity:0;}}

.org-name{font-size:17px;font-weight:900;background:linear-gradient(135deg,#fff 30%,var(--gold));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;line-height:1.4;}
.org-sub{color:var(--gold);font-size:12px;font-weight:600;margin-top:4px;opacity:.85;}

/* بطاقة الدخول */
.login-card{
  background:rgba(255,255,255,.03);
  backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);
  border:1px solid rgba(255,255,255,.08);
  border-radius:28px;
  padding:28px 24px;
  box-shadow:0 30px 80px rgba(0,0,0,.5);
  position:relative;overflow:hidden;
}
.login-card::before{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:50%;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}

/* تبديل الوضع */
.mode-switch{
  display:flex;gap:4px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:14px;padding:4px;
  margin-bottom:22px;
}
.mode-btn{
  flex:1;padding:10px;border:none;background:transparent;
  color:rgba(255,255,255,.5);border-radius:10px;
  font-family:'Cairo';font-size:14px;font-weight:700;
  cursor:pointer;transition:.25s;display:flex;align-items:center;justify-content:center;gap:7px;
}
.mode-btn.active{background:var(--gold);color:var(--navy);}
.mode-btn:not(.active):hover{background:rgba(255,255,255,.05);color:#fff;}

/* حقل الإدخال */
.field{position:relative;margin-bottom:16px;}
.field-icon{
  position:absolute;right:15px;top:50%;transform:translateY(-50%);
  color:var(--gold);font-size:16px;z-index:2;
}
.field input{
  width:100%;padding:14px 46px 14px 16px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.1);
  border-radius:12px;color:#fff;font-family:'Cairo';font-size:16px;
  outline:none;transition:.25s;
}
.field input:focus{border-color:var(--gold);background:rgba(255,255,255,.07);}
.field input::placeholder{color:rgba(255,255,255,.3);}

/* زر الدخول */
.btn-login{
  width:100%;padding:15px;
  background:linear-gradient(135deg,var(--gold),#a07840);
  color:var(--navy);border:none;border-radius:14px;
  font-family:'Cairo';font-size:17px;font-weight:900;
  cursor:pointer;transition:.3s;
  box-shadow:0 8px 25px rgba(197,160,89,.25);
  display:flex;align-items:center;justify-content:center;gap:10px;
  margin-top:8px;
}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(197,160,89,.35);}
.btn-login:active{transform:translateY(0);}
.btn-login:disabled{opacity:.6;cursor:not-allowed;transform:none;}

/* زر بوابة الموظف */
.btn-portal{
  width:100%;padding:14px;
  background:transparent;
  border:1px solid rgba(197,160,89,.3);
  color:var(--gold);border-radius:14px;
  font-family:'Cairo';font-size:15px;font-weight:700;
  cursor:pointer;transition:.3s;
  display:flex;align-items:center;justify-content:center;gap:10px;
}
.btn-portal:hover{background:rgba(197,160,89,.1);border-color:var(--gold);}

/* تنبيه للهاتف */
.mobile-notice{
  display:none;
  background:rgba(239,68,68,.06);
  border:1px solid rgba(239,68,68,.15);
  border-radius:12px;padding:14px;
  color:#fca5a5;font-size:13px;text-align:center;
  margin-bottom:18px;
}
@media(max-width:768px){
  .admin-section .mobile-notice{display:block;}
  .admin-section .desktop-only{display:none;}
}

/* حالة التحميل */
.loader{display:inline-block;width:18px;height:18px;border:2px solid rgba(15,22,40,.3);border-top-color:var(--navy);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* تنبيه الخطأ */
.alert{
  padding:11px 14px;border-radius:10px;font-size:13px;font-weight:600;
  display:none;margin-bottom:14px;
  background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#fca5a5;
}
.alert.show{display:flex;align-items:center;gap:8px;}
.alert.success{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.2);color:#4ade80;}

/* تذييل */
.footer{text-align:center;margin-top:22px;color:rgba(255,255,255,.25);font-size:11px;}
.footer span{color:var(--gold);opacity:.6;}

/* شاشة التحميل */
.splash{
  position:fixed;inset:0;background:var(--navy);z-index:999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  transition:opacity .5s;
}
.splash.hide{opacity:0;pointer-events:none;}
.splash-logo{width:80px;height:80px;border-radius:50%;border:2px solid var(--gold);animation:pulse-s 1.5s ease-in-out infinite;}
@keyframes pulse-s{0%,100%{box-shadow:0 0 0 0 rgba(197,160,89,.4);}50%{box-shadow:0 0 0 15px rgba(197,160,89,0);}}
.splash-text{color:var(--gold);font-weight:700;font-size:14px;}
.splash-bar{width:200px;height:2px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;}
.splash-progress{height:100%;background:var(--gold);border-radius:2px;animation:load 1.5s ease forwards;}
@keyframes load{from{width:0}to{width:100%}}
</style>
</head>
<body>

<!-- شاشة التحميل -->
<div class="splash" id="splash">
  <img src="https://i.ibb.co/rf5pWjnT/image.png" class="splash-logo" alt="logo">
  <div class="splash-text">جاري التحميل...</div>
  <div class="splash-bar"><div class="splash-progress"></div></div>
</div>

<!-- خلفية متحركة -->
<div class="bg-canvas">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
  <div class="stars" id="stars"></div>
</div>

<!-- البطاقة الرئيسية -->
<div class="main-card">
  <!-- الرأس -->
  <div class="header">
    <div class="logo-wrap">
      <div class="logo-ring"></div>
      <div class="logo-ping"></div>
      <img src="https://i.ibb.co/rf5pWjnT/image.png" alt="شعار الجهاز">
    </div>
    <div class="org-name">الجهاز التنفيذي لحفر وصيانة آبار المياه</div>
    <div class="org-sub">الإدارة العامة لشؤون العاملين • المنظومة الذكية</div>
  </div>

  <!-- بطاقة الدخول -->
  <div class="login-card">
    <!-- تبديل الوضع -->
    <div class="mode-switch">
      <button class="mode-btn active" onclick="setMode('admin')" id="btn-mode-admin">
        <i class="fas fa-shield-halved"></i> دخول الإدارة
      </button>
      <button class="mode-btn" onclick="setMode('emp')" id="btn-mode-emp">
        <i class="fas fa-id-badge"></i> بوابة الموظف
      </button>
    </div>

    <!-- قسم المسؤول -->
    <div id="admin-section">
      <div class="mobile-notice">
        <i class="fas fa-desktop" style="font-size:24px;display:block;margin-bottom:8px;"></i>
        لوحة المسؤول تعمل بشكل أفضل على الكمبيوتر
      </div>
      <div class="desktop-only">
        <div id="alert-admin" class="alert"><i class="fas fa-exclamation-circle"></i><span id="alert-admin-msg"></span></div>
        <div class="field">
          <i class="field-icon fas fa-id-card"></i>
          <input type="text" id="admin-id" placeholder="الرقم الوظيفي للمسؤول" inputmode="numeric" autocomplete="off" onkeydown="if(event.key==='Enter')document.getElementById('admin-pass').focus()">
        </div>
        <div class="field">
          <i class="field-icon fas fa-lock"></i>
          <input type="password" id="admin-pass" placeholder="كلمة المرور" autocomplete="off" onkeydown="if(event.key==='Enter')loginAdmin()">
        </div>
        <button class="btn-login" onclick="loginAdmin()" id="btn-admin-login">
          <i class="fas fa-sign-in-alt"></i> دخول لوحة الإدارة
        </button>
      </div>
    </div>

    <!-- قسم الموظف -->
    <div id="emp-section" style="display:none;">
      <div style="text-align:center;padding:20px 0 24px;">
        <div style="width:70px;height:70px;background:rgba(197,160,89,.1);border:1px solid rgba(197,160,89,.2);border-radius:50%;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;">
          <i class="fas fa-user-tie" style="font-size:28px;color:var(--gold);"></i>
        </div>
        <div style="font-size:15px;font-weight:700;color:#fff;margin-bottom:6px;">بوابة الخدمات الذاتية للموظفين</div>
        <div style="font-size:12px;color:rgba(255,255,255,.4);">اطّلع على بياناتك وقدّم طلباتك بسهولة</div>
      </div>
      <button class="btn-portal" onclick="goToPortal()">
        <i class="fas fa-arrow-left"></i>
        الدخول إلى البوابة
        <i class="fas fa-external-link-alt" style="font-size:12px;opacity:.6;"></i>
      </button>
    </div>
  </div>

  <!-- تذييل -->
  <div class="footer">
    <span>منظومة شؤون العاملين</span> • إصدار 2026 الماسي
  </div>
</div>

<script>
const BASE_URL = "<?= ScriptApp.getService().getUrl() ?>";

// توليد النجوم
function createStars() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;animation-delay:${Math.random()*4}s;opacity:${.2+Math.random()*.5};width:${1+Math.random()*2}px;height:${1+Math.random()*2}px;`;
    container.appendChild(s);
  }
}

// إخفاء شاشة التحميل
window.addEventListener('load', () => {
  createStars();
  setTimeout(() => document.getElementById('splash').classList.add('hide'), 1600);
});

// تبديل الوضع
function setMode(mode) {
  const isAdmin = mode === 'admin';
  document.getElementById('btn-mode-admin').classList.toggle('active', isAdmin);
  document.getElementById('btn-mode-emp').classList.toggle('active', !isAdmin);
  document.getElementById('admin-section').style.display = isAdmin ? 'block' : 'none';
  document.getElementById('emp-section').style.display = isAdmin ? 'none' : 'block';
}

// دخول المسؤول
function loginAdmin() {
  const id = document.getElementById('admin-id').value.trim();
  const pass = document.getElementById('admin-pass').value;
  if (!id || !pass) { showAlert('admin', 'يرجى إدخال الرقم الوظيفي وكلمة المرور'); return; }

  const btn = document.getElementById('btn-admin-login');
  btn.disabled = true;
  btn.innerHTML = '<div class="loader"></div> جاري التحقق...';
  hideAlert('admin');

  setTimeout(() => {
    window.top.location.href = BASE_URL + "?id=" + encodeURIComponent(id) + "&pass=" + encodeURIComponent(pass);
  }, 400);
}

// الانتقال لبوابة الموظف
function goToPortal() {
  window.location.href = BASE_URL + "?p=emp";
}

// تنبيهات
function showAlert(type, msg) {
  const el = document.getElementById('alert-' + type);
  const msgEl = document.getElementById('alert-' + type + '-msg');
  if (!el || !msgEl) return;
  msgEl.textContent = msg;
  el.classList.add('show');
  el.classList.remove('success');
}
function hideAlert(type) {
  const el = document.getElementById('alert-' + type);
  if (el) el.classList.remove('show');
}

// إعادة تفعيل الزر عند العودة
window.addEventListener('pageshow', () => {
  const btn = document.getElementById('btn-admin-login');
  if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> دخول لوحة الإدارة'; }
});
</script>
</body>
</html>
