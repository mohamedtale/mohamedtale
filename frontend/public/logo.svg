  <!-- Water waves -->
  <path d="M20 103 Q27 99 34 103 Q41 107 48 103" stroke="#1565C0" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M24 110 Q32 106 40 110 Q48 114 56 110" stroke="#42A5F5" stroke-width="2" fill="none" stroke-linecap="round"/>

