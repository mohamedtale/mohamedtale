  <!-- Gear center hole -->
  <circle cx="60" cy="34" r="14" fill="white" />

  <!-- Drilling rig tower -->
  <!-- Legs -->
  <line x1="52" y1="34" x2="48" y2="52" stroke="#1565C0" stroke-width="3" stroke-linecap="round"/>
  <line x1="68" y1="34" x2="72" y2="52" stroke="#1565C0" stroke-width="3" stroke-linecap="round"/>
  <!-- Cross braces -->
  <line x1="50" y1="42" x2="67" y2="37" stroke="#1565C0" stroke-width="1.5"/>
  <line x1="53" y1="48" x2="69" y2="44" stroke="#1565C0" stroke-width="1.5"/>
  <!-- Top apex -->
  <line x1="52" y1="34" x2="60" y2="22" stroke="#1565C0" stroke-width="3" stroke-linecap="round"/>
  <line x1="68" y1="34" x2="60" y2="22" stroke="#1565C0" stroke-width="3" stroke-linecap="round"/>
  <!-- Derrick mast -->
  <line x1="60" y1="22" x2="60" y2="18" stroke="#1565C0" stroke-width="2" stroke-linecap="round"/>
  <!-- Crown block -->
  <rect x="57" y="17" width="6" height="2.5" rx="1" fill="#42A5F5"/>
  <!-- Base platform -->
  <rect x="46" y="51" width="28" height="3" rx="1.5" fill="#1565C0"/>
  <!-- Drill string -->
  <line x1="60" y1="54" x2="60" y2="60" stroke="#42A5F5" stroke-width="2" stroke-linecap="round"/>

