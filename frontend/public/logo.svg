    L75 55 L70 52
    L65 57 L60 52
    L55 57 L50 52
    L45 55 L43 49
    L37 50 L38 44
    L32 43 L35 37
    L30 34 L35 30
    L32 25 L38 23
    L37 17 L43 18
    L45 12 L50 15
